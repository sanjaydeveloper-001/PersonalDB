<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>User Name · Full Stack Portfolio</title>
  <!-- Google Fonts + Lucide Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue-deep: #0f2d6b;
      --blue-vivid: #1d4ed8;
      --blue-mid: #3b82f6;
      --blue-light: #93c5fd;
      --blue-ghost: #eff6ff;
      --blue-border: #dbeafe;
      --ink: #0b1529;
      --ink-soft: #334155;
      --ink-muted: #64748b;
      --ink-faint: #94a3b8;
      --surface: #ffffff;
      --bg: #f4f8ff;
      --gold: #f59e0b;
      --radius-xl: 2rem;
      --radius-lg: 1.25rem;
      --radius-md: 0.75rem;
      --shadow-card: 0 4px 40px rgba(15, 45, 107, 0.10), 0 1px 4px rgba(15, 45, 107, 0.06);
      --shadow-hover: 0 16px 64px rgba(15, 45, 107, 0.18), 0 2px 8px rgba(15, 45, 107, 0.08);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      33% { transform: translateY(-12px) rotate(2deg); }
      66% { transform: translateY(6px) rotate(-1deg); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(29, 78, 216, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(29, 78, 216, 0); }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: drift 9s ease-in-out infinite;
    }

    .orb-a {
      width: 600px; height: 600px;
      top: -180px; right: -180px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.18) 0%, transparent 70%);
      animation-duration: 9s;
    }

    .orb-b {
      width: 500px; height: 500px;
      bottom: 20vh; left: -200px;
      background: radial-gradient(circle, rgba(29, 78, 216, 0.12) 0%, transparent 70%);
      animation-duration: 11s; animation-delay: 2s;
    }

    .orb-c {
      width: 300px; height: 300px;
      top: 50vh; right: 10vw;
      background: radial-gradient(circle, rgba(147, 197, 253, 0.15) 0%, transparent 70%);
      animation-duration: 7s; animation-delay: 1s;
    }

    @media (max-width: 640px) {
      .orb-a { width: 300px; height: 300px; top: -100px; right: -100px; }
      .orb-b { width: 250px; height: 250px; left: -120px; }
      .orb-c { display: none; }
    }

    .page { min-height: 100vh; background: var(--bg); position: relative; overflow-x: hidden; }

    .inner {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    @media (max-width: 640px) { .inner { padding: 0 1rem 3rem; } }

    .top-nav {
      position: relative; z-index: 10;
      max-width: 1100px; margin: 0 auto;
      padding: 1.25rem 1.5rem 0;
      display: flex; align-items: center; gap: 1.25rem;
    }

    @media (max-width: 640px) { .top-nav { padding: 1rem 1rem 0; gap: 0.875rem; } }

    .nav-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: var(--font-body); font-size: 0.875rem; font-weight: 700;
      color: var(--blue-vivid); background: transparent; border: none;
      padding: 0.25rem 0; cursor: pointer;
      transition: color 0.2s, gap 0.2s; white-space: nowrap;
    }

    .nav-btn svg { width: 0.9rem; height: 0.9rem; }
    .nav-btn:hover { color: var(--blue-deep); gap: 0.6rem; }
    .nav-divider { width: 1px; height: 1.25rem; background: var(--blue-border); }

    .hero-section { padding: 2.5rem 0 0; margin-bottom: 2.5rem; }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2.5rem; align-items: end;
    }

    @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; gap: 2rem; } }

    .hero-left { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }

    .eyebrow-row {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.25rem; flex-wrap: wrap;
    }

    .eyebrow {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--blue-mid);
      background: var(--blue-ghost); border: 1px solid var(--blue-border);
      padding: 0.35rem 1rem; border-radius: 99px;
    }

    .eyebrow-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); animation: glowPulse 2s ease infinite; flex-shrink: 0;
    }

    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 900; line-height: 1.05; color: var(--ink);
      letter-spacing: -0.02em; margin-bottom: 0.5rem; word-break: break-word;
    }

    .hero-name em {
      font-style: italic;
      background: linear-gradient(135deg, var(--blue-vivid) 0%, #0ea5e9 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .hero-domain {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--ink-muted); font-weight: 400; margin-bottom: 1.75rem;
    }

    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.75rem;
    }

    .meta-pill {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.825rem; color: var(--ink-soft);
      background: var(--surface); border: 1px solid var(--blue-border);
      padding: 0.45rem 0.875rem; border-radius: 99px;
      box-shadow: 0 2px 8px rgba(15, 45, 107, 0.06);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .hero-socials {
      display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center;
    }

    .social-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 2.4rem; height: 2.4rem;
      background: var(--surface); border: 1.5px solid var(--blue-border);
      border-radius: 50%; color: var(--blue-vivid); text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 8px rgba(15, 45, 107, 0.06);
    }

    .social-icon:hover {
      background: var(--blue-vivid); color: white;
      border-color: var(--blue-vivid);
      transform: translateY(-4px) scale(1.1);
      box-shadow: 0 8px 24px rgba(29, 78, 216, 0.35);
    }

    .social-icon svg { width: 0.95rem; height: 0.95rem; }

    .resume-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 1.1rem;
      background: linear-gradient(135deg, var(--blue-vivid), #0ea5e9);
      color: white; border-radius: 99px;
      font-family: var(--font-body); font-size: 0.8rem; font-weight: 700;
      text-decoration: none; box-shadow: 0 4px 16px rgba(29, 78, 216, 0.28);
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .resume-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 24px rgba(29, 78, 216, 0.4);
    }

    .avatar-frame {
      position: relative; width: 220px; height: 260px; flex-shrink: 0;
    }

    @media (max-width: 900px) { .avatar-frame { width: 180px; height: 210px; } }
    @media (max-width: 540px) { .avatar-frame { width: 130px; height: 155px; } }

    .avatar-bg {
      position: absolute; inset: 0;
      background: linear-gradient(145deg, var(--blue-vivid), #0ea5e9);
      border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%; opacity: 0.18;
    }

    .avatar-ring {
      position: absolute; inset: -8px;
      border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%;
      border: 2px dashed rgba(59, 130, 246, 0.3);
      animation: spin 20s linear infinite;
    }

    .avatar-img {
      position: absolute; inset: 12px;
      width: calc(100% - 24px); height: calc(100% - 24px);
      object-fit: cover;
      border-radius: 35% 55% 50% 45% / 45% 40% 55% 50%;
      box-shadow: var(--shadow-card);
    }

    .avatar-placeholder {
      position: absolute; inset: 12px;
      background: linear-gradient(145deg, var(--blue-ghost), #dbeafe);
      border-radius: 35% 55% 50% 45% / 45% 40% 55% 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .avatar-placeholder svg {
      width: 4rem;
      height: 4rem;
      color: var(--blue-vivid);
      opacity: 0.6;
    }

    .stats-badge {
      background: var(--surface); border: 1px solid var(--blue-border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem;
      box-shadow: var(--shadow-card);
      display: flex; gap: 1.25rem; flex-wrap: wrap;
    }

    @media (max-width: 900px) {
      .stats-badge { flex-direction: column; gap: 0.75rem; padding: 1rem; }
      .stat-item { text-align: left; display: flex; align-items: center; gap: 0.5rem; }
      .stat-item .stat-number { font-size: 1.2rem; }
    }

    .stat-item .stat-number {
      display: block; font-size: 1.4rem; font-weight: 700;
      color: var(--blue-vivid); font-family: var(--font-display);
    }

    .stat-item .stat-label {
      font-size: 0.7rem; color: var(--ink-faint);
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue-border) 20%, var(--blue-border) 80%, transparent);
      margin: 0 0 2.5rem;
    }

    .summary-strip {
      background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-vivid) 60%, #0ea5e9 100%);
      border-radius: var(--radius-xl); padding: 2.25rem 2.5rem;
      margin-bottom: 2.75rem; position: relative; overflow: hidden;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    .summary-strip::before {
      content: '"'; position: absolute; top: -1rem; left: 1.5rem;
      font-family: var(--font-display); font-size: 10rem;
      color: rgba(255, 255, 255, 0.07); line-height: 1; pointer-events: none;
    }

    .summary-text {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: rgba(255, 255, 255, 0.92); line-height: 1.8;
      font-style: italic; font-family: var(--font-display);
      position: relative; z-index: 1; max-width: 800px;
    }

    .section-wrap {
      margin-bottom: 2.75rem;
      animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .section-label {
      display: flex; align-items: center; gap: 0.875rem; margin-bottom: 1.5rem;
    }

    .label-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--blue-border), transparent);
    }

    .label-text {
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 3vw, 1.6rem);
      font-weight: 700; color: var(--ink); white-space: nowrap; letter-spacing: -0.01em;
    }

    .label-icon {
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-vivid), #0ea5e9);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(29, 78, 216, 0.3); flex-shrink: 0; color: white;
    }

    .label-icon svg { width: 1.25rem; height: 1.25rem; }

    .timeline { display: flex; flex-direction: column; }

    .timeline-item {
      display: grid; grid-template-columns: 160px 40px 1fr;
    }

    @media (max-width: 720px) { .timeline-item { grid-template-columns: 0px 28px 1fr; } }

    .timeline-date { padding: 0 1.25rem 2.25rem 0; text-align: right; }

    .date-label {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      color: var(--blue-vivid); background: var(--blue-ghost);
      border: 1px solid var(--blue-border);
      padding: 0.3rem 0.7rem; border-radius: 99px;
    }

    @media (max-width: 720px) { .timeline-date { display: none; } }

    .timeline-spine { display: flex; flex-direction: column; align-items: center; }

    .spine-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-vivid), #0ea5e9);
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 2px var(--blue-border), 0 4px 12px rgba(29, 78, 216, 0.3);
      margin-top: 1.5rem; z-index: 1;
    }

    .spine-line {
      flex: 1; width: 2px;
      background: linear-gradient(to bottom, var(--blue-light), rgba(147, 197, 253, 0.1));
      margin-top: 4px;
    }

    .timeline-body { padding: 0 0 2.25rem 1.25rem; }

    .timeline-card {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 1.5rem 1.75rem; border: 1px solid var(--blue-border);
      box-shadow: var(--shadow-card);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;
    }

    .timeline-card:hover {
      transform: translateY(-4px) translateX(2px);
      box-shadow: var(--shadow-hover); border-color: var(--blue-light);
    }

    .timeline-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: linear-gradient(90deg, var(--blue-vivid), #0ea5e9);
      opacity: 0; transition: opacity 0.3s;
    }

    .timeline-card:hover::before { opacity: 1; }

    .card-title {
      font-size: clamp(0.925rem, 2vw, 1.05rem);
      font-weight: 700; color: var(--ink); margin-bottom: 0.2rem;
    }

    .card-sub {
      font-size: 0.85rem; color: var(--blue-vivid);
      font-weight: 600; margin-bottom: 0.6rem;
    }

    .card-date-mobile {
      display: none; font-size: 0.7rem; font-weight: 700;
      color: var(--ink-faint); margin-bottom: 0.65rem;
    }

    @media (max-width: 720px) {
      .card-date-mobile { display: block; }
      .timeline-body { padding-left: 0.875rem; }
    }

    .card-desc { font-size: 0.875rem; color: var(--ink-soft); line-height: 1.75; }

    .project-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem;
    }

    .project-card {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 1.75rem; border: 1px solid var(--blue-border);
      box-shadow: var(--shadow-card); position: relative;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .project-card:hover {
      transform: translateY(-6px); box-shadow: var(--shadow-hover); border-color: var(--blue-light);
    }

    .project-num {
      font-family: var(--font-display); font-size: 3.25rem; font-weight: 900;
      color: var(--blue-ghost); line-height: 1; position: absolute;
      top: 0.875rem; right: 1.1rem; pointer-events: none;
    }

    .project-title {
      font-size: clamp(0.975rem, 2vw, 1.1rem); font-weight: 700;
      color: var(--ink); padding-right: 2rem; margin-bottom: 0.5rem;
    }

    .project-desc {
      font-size: 0.875rem; color: var(--ink-soft); line-height: 1.7; margin-bottom: 0.75rem;
    }

    .tag-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }

    .tech-tag {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      color: var(--blue-vivid); background: var(--blue-ghost);
      border: 1px solid var(--blue-border);
      padding: 0.22rem 0.6rem; border-radius: 0.35rem;
    }

    .project-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .proj-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; font-weight: 700;
      padding: 0.45rem 0.875rem; border-radius: 0.6rem; text-decoration: none;
      border: 1.5px solid var(--blue-border);
      color: var(--blue-vivid); background: var(--blue-ghost); transition: all 0.25s;
    }

    .proj-link:hover {
      background: var(--blue-vivid); color: white;
      border-color: var(--blue-vivid); transform: translateY(-2px);
    }

    .proj-link svg { width: 0.6rem; height: 0.6rem; }

    .skills-layout {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.1rem;
    }

    @media (max-width: 820px) { .skills-layout { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .skills-layout { grid-template-columns: 1fr; } }

    .skill-panel {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 1.5rem; border: 1px solid var(--blue-border);
    }

    .skill-panel-title {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--blue-mid);
      margin-bottom: 1.1rem; padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--blue-border);
      display: flex; align-items: center; gap: 0.5rem;
    }

    .skill-items { display: flex; flex-direction: column; gap: 0.45rem; }

    .skill-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 0.8rem; background: var(--bg); border-radius: 0.5rem;
    }

    .skill-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-vivid), #0ea5e9);
    }

    .cert-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.1rem;
    }

    .cert-card {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 1.375rem 1.5rem; border: 1px solid var(--blue-border);
      position: relative; transition: all 0.3s;
    }

    .cert-card::before {
      content: '✦'; position: absolute; top: 0.875rem; right: 0.875rem;
      color: var(--gold); font-size: 1rem;
    }

    .cert-card:hover {
      transform: translateY(-4px); box-shadow: var(--shadow-hover);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .cert-name {
      font-size: 0.975rem; font-weight: 700; color: var(--ink);
      padding-right: 1.5rem; margin-bottom: 0.25rem;
    }

    .cert-issuer { font-size: 0.825rem; font-weight: 600; color: var(--blue-vivid); }

    .cert-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.78rem; font-weight: 700;
      color: var(--blue-vivid); text-decoration: none; margin-top: 0.5rem;
    }

    .cert-link svg { width: 0.6rem; height: 0.6rem; }

    .interest-flow { display: flex; flex-wrap: wrap; gap: 0.65rem; }

    .interest-pill {
      font-size: 0.9rem; font-weight: 600; color: var(--blue-vivid);
      background: var(--surface); border: 2px solid var(--blue-border);
      padding: 0.55rem 1.25rem; border-radius: 99px; transition: all 0.25s;
    }

    .empty-state {
      background: var(--surface); border: 1.5px dashed var(--blue-border);
      border-radius: var(--radius-lg); padding: 2.5rem;
      text-align: center; color: var(--ink-faint);
    }

    .empty-state svg { width: 2.5rem; height: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }

    .footer {
      margin-top: 3rem; padding-top: 2rem;
      border-top: 1px solid var(--blue-border);
      text-align: center; color: var(--ink-muted);
    }

    .footer-social {
      display: flex; justify-content: center; gap: 1rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }

    .footer-contact {
      display: flex; justify-content: center; gap: 1.5rem;
      flex-wrap: wrap; margin-bottom: 1rem; font-size: 0.9rem;
    }

    .footer-contact a {
      color: var(--blue-vivid); text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }

    .footer-contact a:hover { text-decoration: underline; }
    .footer-contact a svg { width: 0.9rem; height: 0.9rem; }
    .copyright { font-size: 0.8rem; opacity: 0.7; }
  </style>
</head>
<body>
<div class="page">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

  <div class="top-nav">
    <button class="nav-btn" id="backBtn"><i data-lucide="chevron-left"></i>Back</button>
    <span class="nav-divider"></span>
    <button class="nav-btn" id="homeBtn"><i data-lucide="home"></i>Home</button>
  </div>

  <div class="inner" id="app-root"></div>
</div>

<script>
  function initializeLucideIcons() {
    if (typeof lucide !== 'undefined' && lucide.createIcons) {
      lucide.createIcons();
    } else {
      setTimeout(initializeLucideIcons, 50);
    }
  }

  // Generic portfolio data — all personal information replaced with placeholder / general names
  const portfolioData = {
    "profile": {
      "_id": "generic_profile_001",
      "user": "generic_user_id",
      "contact": [],
      "social": [
        { "id": 1001, "name": "GitHub", "link": "https://github.com/example-dev", "icon": "Github", "color": "#24292F", "_id": "social_github" },

    if (!path) return null;
    if (path.startsWith('http')) return path;
    return null; // No local API used, generic data doesn't rely on backend

    let link = item.link || "";
    if (!link) return null;
    if (item.icon === 'Mail' && !link.startsWith('mailto:')) return `mailto:${link}`;
    return link;
  }

  function getIconHTML(iconName) {
    if (BRAND_SVGS[iconName]) return BRAND_SVGS[iconName];
    const map = {
      'Code2': 'code-2', 'Globe': 'globe', 'Mail': 'mail', 'Phone': 'phone', 'FileText': 'file-text'
    };
    const lucideName = map[iconName] || iconName.toLowerCase().replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
    return `<i data-lucide="${lucideName}"></i>`;
  }

  function renderAvatarContent(profilePhotoUrl, fullName) {
    // If profilePhotoUrl exists and is not empty, show the image
    if (profilePhotoUrl && profilePhotoUrl.trim() !== '') {
      return `<img 
        src="${profilePhotoUrl}" 
        class="avatar-img" 
        alt="${fullName}" 
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'; initializeLucideIcons();"
      />
      <div class="avatar-placeholder" style="display:none;">
        <i data-lucide="user"></i>
      </div>`;
    }
    // If no profilePhotoUrl, show the placeholder icon
    return `<div class="avatar-placeholder">
      <i data-lucide="user"></i>
    </div>`;
  }

  function renderApp(data) {
    const p = data.profile;
    const fullName = p.name || 'User Name';
    const [firstName, ...lastNameParts] = fullName.split(' ');
    const lastName = lastNameParts.join(' ') || '';
    const socialLinks = (p.social || []).filter(item => buildSocialHref(item));
    const cvLink = p.cvLink?.trim() || null;
    const eduCount = data.education.length;
    const expCount = data.experience.length;
    const projCount = data.projects.length;
    const certCount = data.certifications.length;
    const profilePhotoUrl = p.profilePhotoUrl ? p.profilePhotoUrl : null;

    const renderEducation = () => `<div class="timeline">${data.education.map((edu, idx) => {
      const dur = edu.duration || 'Duration N/A';
      const score = edu.cgpa ? `CGPA: ${edu.cgpa}` : (edu.percentage ? `Percentage: ${edu.percentage}%` : null);
      return `<div class="timeline-item">
        <div class="timeline-date"><span class="date-label">${dur}</span></div>
        <div class="timeline-spine"><div class="spine-dot"></div>${idx < data.education.length - 1 ? '<div class="spine-line"></div>' : ''}</div>
        <div class="timeline-body"><div class="timeline-card">
          <div class="card-date-mobile">${dur}</div>
          <div class="card-title">${edu.institution}</div>
          <div class="card-sub">${edu.course}</div>
          ${score ? `<div class="card-desc">📊 ${score}</div>` : ''}
        </div></div>
      </div>`}).join('')}</div>`;
    
    const renderExperience = () => `<div class="timeline">${data.experience.map((exp, idx) => `
      <div class="timeline-item">
        <div class="timeline-date"><span class="date-label">${exp.duration || 'N/A'}</span></div>
        <div class="timeline-spine"><div class="spine-dot"></div>${idx < data.experience.length - 1 ? '<div class="spine-line"></div>' : ''}</div>
        <div class="timeline-body"><div class="timeline-card">
          <div class="card-date-mobile">${exp.duration || 'N/A'}</div>
          <div class="card-title">${exp.role}</div>
          <div class="card-sub">${exp.company}${exp.type ? ` · ${exp.type}` : ''}</div>
          ${exp.description ? `<div class="card-desc">${exp.description}</div>` : ''}
        </div></div>
      </div>`).join('')}</div>`;
    
    const renderProjects = () => `<div class="project-grid">${data.projects.map((proj, idx) => `
      <div class="project-card">
        <div class="project-num">0${idx + 1}</div>
        <div class="project-title">${proj.title}</div>
        ${proj.description ? `<div class="project-desc">${proj.description}</div>` : ''}
        ${proj.tech?.length ? `<div class="tag-row">${proj.tech.map(t => `<span class="tech-tag">${t}</span>`).join('')}</div>` : ''}
        <div class="project-links">
          ${proj.demo ? `<a href="${proj.demo}" target="_blank" rel="noopener" class="proj-link">Live <i data-lucide="arrow-up-right"></i></a>` : ''}
          ${proj.repo ? `<a href="${proj.repo}" target="_blank" rel="noopener" class="proj-link">Repo ${BRAND_SVGS['Github']}</a>` : ''}
        </div>
      </div>`).join('')}</div>`;
    
    const renderSkills = () => {
      const categories = data.skills?.skills || [];
      if (!categories.length) return `<div class="empty-state"><i data-lucide="layers"></i><div>No skills added</div></div>`;
      return `<div class="skills-layout">${categories.map(cat => `
        <div class="skill-panel">
          <div class="skill-panel-title">${cat.category}</div>
          <div class="skill-items">${cat.items.map(item => `<div class="skill-item"><span>${item}</span><div class="skill-dot"></div></div>`).join('')}</div>
        </div>`).join('')}</div>`;
    };
    
    const renderCerts = () => `<div class="cert-grid">${data.certifications.map(cert => `
      <div class="cert-card">
        <div class="cert-name">${cert.name}</div>
        <div class="cert-issuer">${cert.issuer}</div>
        ${cert.link ? `<a href="${cert.link}" target="_blank" class="cert-link">View Credential <i data-lucide="arrow-up-right"></i></a>` : ''}
      </div>`).join('')}</div>`;
    
    const renderInterests = () => {
      const interestList = data.interests?.interests || [];
      if (!interestList.length) return '';
      return `<div class="section-wrap"><div class="section-label"><div class="label-icon"><i data-lucide="sparkles"></i></div><div class="label-text">Interests</div><div class="label-line"></div></div><div class="interest-flow">${interestList.map(i => `<div class="interest-pill">${i}</div>`).join('')}</div></div>`;
    };
    
    const renderSocialIcon = (item) => {
      const href = buildSocialHref(item);
      if (!href) return '';
      const iconHTML = getIconHTML(item.icon);
      return `<a href="${href}" target="_blank" rel="noopener" class="social-icon" title="${item.name || ''}" style="color: ${item.color || 'var(--blue-vivid)'};">${iconHTML}</a>`;
    };
    
    const heroHtml = `
      <div class="hero-section">
        <div class="hero-grid">
          <div class="hero-left">
            <div class="eyebrow-row"><div class="eyebrow-dot"></div><div class="eyebrow">${p.domain || 'Professional Portfolio'}</div></div>
            <div class="hero-name">${firstName}&nbsp;<em>${lastName}</em></div>
            <div class="hero-domain">${p.domain || 'Full Stack Developer'} · ${p.location || 'Remote'}</div>
            <div class="hero-meta">
              ${p.email ? `<div class="meta-pill"><i data-lucide="mail"></i> ${p.email}</div>` : ''}
              ${p.phone ? `<div class="meta-pill"><i data-lucide="phone"></i> ${p.phone}</div>` : ''}
              ${p.location ? `<div class="meta-pill"><i data-lucide="map-pin"></i> ${p.location}</div>` : ''}
            </div>
            <div class="hero-socials">
              ${socialLinks.map(renderSocialIcon).join('')}
              ${cvLink ? `<a href="${cvLink}" target="_blank" class="resume-btn"><i data-lucide="file-text"></i> Resume</a>` : ''}
            </div>
          </div>
          <div class="hero-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:1.25rem">
            <div class="avatar-frame">
              <div class="avatar-bg"></div>
              <div class="avatar-ring"></div>
              ${renderAvatarContent(profilePhotoUrl, fullName)}
            </div>
            <div class="stats-badge">
              <div class="stat-item"><span class="stat-number">${eduCount}</span><span class="stat-label">Education</span></div>
              <div class="stat-item"><span class="stat-number">${expCount}</span><span class="stat-label">Roles</span></div>
              <div class="stat-item"><span class="stat-number">${projCount}</span><span class="stat-label">Projects</span></div>
              <div class="stat-item"><span class="stat-number">${certCount}</span><span class="stat-label">Certs</span></div>
            </div>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      ${p.summary ? `<div class="summary-strip"><div class="summary-text">"${p.summary.replace(/\n/g, ' ')}"</div></div>` : ''}
      <div class="section-wrap"><div class="section-label"><div class="label-icon"><i data-lucide="book-open"></i></div><div class="label-text">Education</div><div class="label-line"></div></div>${renderEducation()}</div>
      <div class="section-wrap"><div class="section-label"><div class="label-icon"><i data-lucide="briefcase"></i></div><div class="label-text">Experience</div><div class="label-line"></div></div>${renderExperience()}</div>
      <div class="section-wrap"><div class="section-label"><div class="label-icon"><i data-lucide="code-2"></i></div><div class="label-text">Projects</div><div class="label-line"></div></div>${renderProjects()}</div>
      <div class="section-wrap"><div class="section-label"><div class="label-icon"><i data-lucide="layers"></i></div><div class="label-text">Skills</div><div class="label-line"></div></div>${renderSkills()}</div>
      <div class="section-wrap"><div class="section-label"><div class="label-icon"><i data-lucide="award"></i></div><div class="label-text">Certifications</div><div class="label-line"></div></div>${renderCerts()}</div>
      ${renderInterests()}
      <footer class="footer"><div class="footer-social">${socialLinks.map(renderSocialIcon).join('')}</div><div class="footer-contact">${p.email ? `<a href="mailto:${p.email}"><i data-lucide="mail"></i> ${p.email}</a>` : ''}${p.phone ? `<a href="tel:${p.phone.replace(/\s/g, '')}"><i data-lucide="phone"></i> ${p.phone}</a>` : ''}</div><div class="copyright">© ${new Date().getFullYear()} ${fullName} · Built with passion</div></footer>`;
    document.getElementById('app-root').innerHTML = heroHtml;
    initializeLucideIcons();
  }
  
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => renderApp(portfolioData));
  else renderApp(portfolioData);
  
  document.getElementById('backBtn').addEventListener('click', () => window.history.back());
  document.getElementById('homeBtn').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
