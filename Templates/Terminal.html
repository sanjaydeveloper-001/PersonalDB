      border-radius: var(--radius); transition: all 0.2s; display: flex; align-items: center; gap: 0.35rem;

    .nav-btn:hover { color: var(--green); background: var(--green-ghost); }
    .nav-btn svg { width: 0.85rem; height: 0.85rem; }
    .nav-spacer { flex: 1; }
    .nav-status { font-size: 0.7rem; color: var(--green-dim); display: flex; align-items: center; gap: 0.4rem; }

    .output-block { margin-top: 0.5rem; padding-left: 0; }
    .out-comment { color: var(--text-muted); }
    .out-key { color: var(--cyan); }
    .out-val { color: var(--yellow); }
    .out-str { color: var(--orange); }
    .out-num { color: var(--purple); }

    .hero-role { font-size: 0.875rem; color: var(--text-soft); margin-top: 0.5rem; }
    .cursor { display: inline-block; background: var(--green); width: 0.6em; height: 1.1em; vertical-align: middle; animation: blink 1s step-end infinite; }

    "skills": { "skills": [{ "category": "Frontend", "items": ["React", "Vue.js", "Tailwind CSS", "TypeScript"] }, { "category": "Backend", "items": ["Node.js", "Express", "Python", "PostgreSQL", "MongoDB"] }, { "category": "Tools & DevOps", "items": ["Git/GitHub", "Docker", "VS Code", "Postman", "Vercel"] }] },
    "certifications": [{ "_id": "cert_1", "name": "Meta Backend Developer Professional", "issuer": "Coursera", "link": "https://coursera.org/verify/example" }, { "_id": "cert_2", "name": "AWS Cloud Practitioner", "issuer": "Amazon Web Services", "link": "https://aws.amazon.com/verification/example" }],
    "interests": { "interests": ["Open Source", "Cloud Architecture", "UI/UX Design", "Tech Writing", "Hiking", "Chess"] }
  };

  function renderApp(data) {
    const p = data.profile;
    const fullName = p.name || 'User Name';
    const socialLinks = (p.social || []).filter(i => buildSocialHref(i));
    const edu = data.education, exp = data.experience, proj = data.projects, certs = data.certifications;
    const interestList = data.interests?.interests || [];
    const skills = data.skills?.skills || [];

    const renderSocialChip = (item) => {
      const href = buildSocialHref(item);
      if (!href) return '';
      return `<a href="${href}" target="_blank" class="social-chip">${getIconHTML(item.icon)} ${item.name}</a>`;
    };

    const now = new Date();
    const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

    const html = `
      <div class="hero">
        <div class="window-bar">
          <div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div>
          <div class="win-title">portfolio.sh — bash — ${ts}</div>
        </div>
        <div class="terminal-body">
          <div class="cmd-line">
            <span class="prompt-user">visitor</span>
            <span class="prompt-at">@</span>
            <span class="prompt-host">portfolio</span>
            <span class="prompt-dir">:~/</span>
            <span class="prompt-sym">$</span>
            <span class="prompt-cmd">cat profile.json</span>
          </div>
          <div class="output-block">
            <div><span class="out-comment">// Loading profile...</span></div>
            <div>{</div>
            <div style="padding-left:1.5rem"><span class="out-key">"name"</span>: <span class="out-str">"${fullName}"</span>,</div>
            <div style="padding-left:1.5rem"><span class="out-key">"role"</span>: <span class="out-str">"${p.domain || 'Full Stack Developer'}"</span>,</div>
            <div style="padding-left:1.5rem"><span class="out-key">"location"</span>: <span class="out-str">"${p.location || 'Remote'}"</span>,</div>
            ${p.email ? `<div style="padding-left:1.5rem"><span class="out-key">"email"</span>: <span class="out-str">"${p.email}"</span>,</div>` : ''}
            <div style="padding-left:1.5rem"><span class="out-key">"available"</span>: <span class="out-bool">true</span></div>
            <div>}</div>
          </div>

          <div class="hero-name-block">
            <div class="ascii-name">${fullName.split('').map((c, i) => c === ' ' ? '&nbsp;' : `<span class="glitch-char" style="--d:${i * 0.1}s">${c}</span>`).join('')}<span class="cursor"></span></div>
            <div class="hero-role">// ${p.domain || 'Full Stack Developer'}</div>
          </div>

          <div class="meta-grid">
            ${p.email ? `<div class="meta-row"><span class="out-key">email</span><span style="color:var(--text-muted)">:</span>&nbsp;<span class="out-str">${p.email}</span></div>` : ''}
            ${p.phone ? `<div class="meta-row"><span class="out-key">phone</span><span style="color:var(--text-muted)">:</span>&nbsp;<span class="out-str">${p.phone}</span></div>` : ''}
            ${p.location ? `<div class="meta-row"><span class="out-key">location</span><span style="color:var(--text-muted)">:</span>&nbsp;<span class="out-val">${p.location}</span></div>` : ''}
          </div>

          <div class="social-row">
            ${socialLinks.map(renderSocialChip).join('')}
            ${p.cvLink ? `<a href="${p.cvLink}" target="_blank" class="resume-chip"><i data-lucide="file-text"></i> resume.pdf</a>` : ''}
          </div>

          <div class="stats-row">
            <div class="stat"><span class="stat-n">${edu.length}</span><span class="stat-l">education</span></div>
            <div class="stat"><span class="stat-n">${exp.length}</span><span class="stat-l">roles</span></div>
            <div class="stat"><span class="stat-n">${proj.length}</span><span class="stat-l">projects</span></div>
            <div class="stat"><span class="stat-n">${certs.length}</span><span class="stat-l">certs</span></div>
          </div>
        </div>
      </div>

      ${p.summary ? `<div class="summary-block"><div class="summary-label">// summary</div>${p.summary}</div>` : ''}

      <!-- Education -->
      <div class="section">
        <div class="sec-header">
          <span class="sec-index">[01]</span>
          <span class="sec-title">Education</span>
          <div class="sec-line"></div>
          <span class="sec-count">${edu.length} records</span>
        </div>
        <div class="card-list">
          ${edu.map(e => {
            const score = e.cgpa ? `CGPA: ${e.cgpa}` : (e.percentage ? `Score: ${e.percentage}%` : null);
            return `<div class="card">
              <div class="card-head">
                <div><div class="card-title">${e.institution}</div><div class="card-sub">${e.course}</div></div>
                <div class="card-badge">${e.duration || 'N/A'}</div>
              </div>
              ${score ? `<div class="card-score">→ ${score}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Experience -->
      <div class="section">
        <div class="sec-header">
          <span class="sec-index">[02]</span>
          <span class="sec-title">Experience</span>
          <div class="sec-line"></div>
          <span class="sec-count">${exp.length} records</span>
        </div>
        <div class="card-list">
          ${exp.map(e => `<div class="card">
            <div class="card-head">
              <div><div class="card-title">${e.role}</div><div class="card-sub">${e.company}${e.type ? ` · ${e.type}` : ''}</div></div>
              <div class="card-badge">${e.duration || 'N/A'}</div>
            </div>
            ${e.description ? `<div class="card-desc">${e.description}</div>` : ''}
          </div>`).join('')}
        </div>
      </div>

      <!-- Projects -->
      <div class="section">
        <div class="sec-header">
          <span class="sec-index">[03]</span>
          <span class="sec-title">Projects</span>
          <div class="sec-line"></div>
          <span class="sec-count">${proj.length} repos</span>
        </div>
        <div class="proj-grid">
          ${proj.map((pr, i) => `<div class="proj-card">
            <div class="proj-num">// ${String(i+1).padStart(3,'0')}.js</div>
            <div class="proj-title">${pr.title}</div>
            ${pr.description ? `<div class="proj-desc">${pr.description}</div>` : ''}
            ${pr.tech?.length ? `<div class="tag-row">${pr.tech.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
            <div class="proj-links">
              ${pr.demo ? `<a href="${pr.demo}" target="_blank" class="proj-link">live <i data-lucide="arrow-up-right"></i></a>` : ''}
              ${pr.repo ? `<a href="${pr.repo}" target="_blank" class="proj-link">repo ${BRAND_SVGS['Github']}</a>` : ''}
            </div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Skills -->
      <div class="section">
        <div class="sec-header">
          <span class="sec-index">[04]</span>
          <span class="sec-title">Skills</span>
          <div class="sec-line"></div>
          <span class="sec-count">${skills.reduce((a,c)=>a+c.items.length,0)} items</span>
        </div>
        <div class="skill-grid">
          ${skills.map(cat => `<div class="skill-block">
            <div class="skill-cat">${cat.category}</div>
            <div class="skill-list">
              ${cat.items.map((item, i) => {
                const bars = 5; const filled = Math.max(3, bars - (i % 2));
                return `<div class="skill-item">
                  <span>${item}</span>
                  <div class="skill-bar">${Array.from({length:bars}).map((_,j) => `<div class="bar-seg ${j<filled?'active':''}"></div>`).join('')}</div>
                </div>`;
              }).join('')}
            </div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Certifications -->
      <div class="section">
        <div class="sec-header">
          <span class="sec-index">[05]</span>
          <span class="sec-title">Certifications</span>
          <div class="sec-line"></div>
          <span class="sec-count">${certs.length} records</span>
        </div>
        <div class="cert-grid">
          ${certs.map(c => `<div class="cert-card">
            <div class="cert-icon">✦ verified</div>
            <div class="cert-name">${c.name}</div>
            <div class="cert-issuer">${c.issuer}</div>
            ${c.link ? `<a href="${c.link}" target="_blank" class="cert-link">view credential <i data-lucide="arrow-up-right"></i></a>` : ''}
          </div>`).join('')}
        </div>
      </div>

      ${interestList.length ? `<div class="section">
        <div class="sec-header">
          <span class="sec-index">[06]</span>
          <span class="sec-title">Interests</span>
          <div class="sec-line"></div>
        </div>
        <div class="interest-row">
          ${interestList.map(i => `<span class="interest-tag">${i}</span>`).join('')}
        </div>
      </div>` : ''}

      <footer class="footer">
        <div class="footer-cmd"><span style="color:var(--green)">~$</span> echo "Thanks for visiting" | cowsay</div>
        <div class="footer-copy">© ${new Date().getFullYear()} ${fullName} · All rights reserved</div>
      </footer>
    `;

    document.getElementById('app-root').innerHTML = html;
    if (typeof lucide !== 'undefined') lucide.createIcons();
    else setTimeout(() => lucide.createIcons(), 100);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => renderApp(portfolioData));
  else renderApp(portfolioData);
  document.getElementById('backBtn').addEventListener('click', () => window.history.back());
  document.getElementById('homeBtn').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
</script>
</body>
</html>
