<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>User Name · Glass Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@300;400;500;700;800;900&family=Zodiak:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08060f;
      --bg2: #0f0c1a;
      --glass: rgba(255,255,255,0.04);
      --glass2: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.1);
      --glass-border2: rgba(255,255,255,0.18);
      --violet: #8b5cf6;
      --violet2: #a78bfa;
      --violet3: #c4b5fd;
      --fuchsia: #d946ef;
      --pink: #f472b6;
      --teal: #2dd4bf;
      --gold: #fbbf24;
      --text: #f4f0ff;
      --text-soft: #c4b5fd;
      --text-muted: #7c6fa0;
      --text-faint: #4b4468;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
      --radius: 16px;
      --radius-sm: 8px;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); font-family: var(--font-body); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)} }
    @keyframes float1 { 0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.03)} }
    @keyframes float2 { 0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(20px) scale(0.97)} }
    @keyframes float3 { 0%,100%{transform:translateX(0)}50%{transform:translateX(20px)} }
    @keyframes shimmer { 0%{background-position:-200% 0}100%{background-position:200% 0} }
    @keyframes pulse { 0%,100%{opacity:0.6}50%{opacity:1} }

    /* Orbs */
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(100px); }
    .orb1 { width: 700px; height: 700px; top: -200px; right: -150px; background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, transparent 70%); animation: float1 12s ease-in-out infinite; }
    .orb2 { width: 500px; height: 500px; bottom: 10vh; left: -150px; background: radial-gradient(circle, rgba(217,70,239,0.2) 0%, transparent 70%); animation: float2 10s ease-in-out infinite 2s; }
    .orb3 { width: 400px; height: 400px; top: 40vh; right: 15vw; background: radial-gradient(circle, rgba(45,212,191,0.12) 0%, transparent 70%); animation: float3 8s ease-in-out infinite 1s; }
    @media (max-width: 640px) { .orb1{width:300px;height:300px} .orb2{width:250px;height:250px} .orb3{display:none} }

    /* Star field */
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: radial-gradient(1px 1px at 20% 10%, rgba(255,255,255,0.4) 0%, transparent 100%), radial-gradient(1px 1px at 65% 25%, rgba(255,255,255,0.3) 0%, transparent 100%), radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.35) 0%, transparent 100%), radial-gradient(1px 1px at 80% 80%, rgba(255,255,255,0.25) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 10% 90%, rgba(255,255,255,0.3) 0%, transparent 100%), radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,0.2) 0%, transparent 100%), radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.35) 0%, transparent 100%), radial-gradient(1px 1px at 30% 75%, rgba(255,255,255,0.25) 0%, transparent 100%); }

    .page { position: relative; z-index: 1; min-height: 100vh; }

    /* Nav */
    .top-nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(8,6,15,0.8); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 0.875rem 2rem; display: flex; align-items: center; gap: 1.25rem;
    }
    .nav-logo { font-family: var(--font-display); font-style: italic; font-size: 1.05rem; font-weight: 400; color: var(--violet3); letter-spacing: 0.02em; }
    .nav-btn {
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px;
      font-family: var(--font-body); font-size: 0.78rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer; padding: 0.35rem 0.75rem;
      display: flex; align-items: center; gap: 0.35rem; transition: all 0.2s;
    }
    .nav-btn:hover { border-color: var(--violet); color: var(--violet3); background: rgba(139,92,246,0.1); }
    .nav-btn svg { width: 0.8rem; height: 0.8rem; }
    .nav-spacer { flex: 1; }
    .nav-status { font-size: 0.72rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }

    .inner { max-width: 1100px; margin: 0 auto; padding: 0 2rem 5rem; }
    @media (max-width: 640px) { .inner { padding: 0 1rem 3rem; } }

    /* Glass card base */
    .glass {
      background: var(--glass); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: var(--radius);
    }
    .glass:hover { border-color: var(--glass-border2); }

    /* Hero */
    .hero { padding: 3rem 0 0; margin-bottom: 2.5rem; animation: fadeUp 0.7s ease both; }

    .hero-inner {
      background: linear-gradient(135deg, rgba(139,92,246,0.08) 0%, rgba(217,70,239,0.05) 50%, rgba(8,6,15,0.3) 100%);
      border: 1px solid var(--glass-border); border-radius: 24px;
      padding: 2.5rem; backdrop-filter: blur(20px); position: relative; overflow: hidden;
    }
    .hero-inner::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--violet), var(--fuchsia), transparent);
      opacity: 0.6;
    }

    .hero-grid { display: grid; grid-template-columns: 1fr 280px; gap: 2.5rem; align-items: start; }
    @media (max-width: 860px) { .hero-grid { grid-template-columns: 1fr; } }

    /* Eyebrow */
    .eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3);
      border-radius: 99px; padding: 0.3rem 0.875rem; margin-bottom: 1.5rem;
    }
    .eyebrow-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
    .eyebrow-text { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--violet3); font-weight: 700; }

    .hero-name {
      font-family: var(--font-display); font-weight: 300;
      font-size: clamp(2.5rem, 7vw, 5.5rem); line-height: 1;
      color: var(--text); letter-spacing: -0.02em; margin-bottom: 0.75rem;
    }
    .hero-name em { font-style: italic; background: linear-gradient(135deg, var(--violet2), var(--fuchsia)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .hero-role { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 1.5rem; font-weight: 400; }

    .hero-summary-text { font-size: 0.925rem; color: var(--text-soft); line-height: 1.9; margin-bottom: 1.75rem; max-width: 540px; }

    .hero-meta { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.75rem; }
    .meta-chip {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: 0.4rem 0.75rem; width: fit-content;
      font-size: 0.8rem; color: var(--text-muted);
    }
    .meta-chip svg { width: 0.8rem; height: 0.8rem; color: var(--violet2); flex-shrink: 0; }

    .hero-cta { display: flex; gap: 0.625rem; flex-wrap: wrap; }
    .btn-glow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: linear-gradient(135deg, var(--violet), var(--fuchsia));
      color: white; padding: 0.65rem 1.375rem; border-radius: var(--radius-sm);
      font-size: 0.83rem; font-weight: 700; text-decoration: none;
      box-shadow: 0 4px 24px rgba(139,92,246,0.4); transition: all 0.25s;
      border: none;
    }
    .btn-glow:hover { box-shadow: 0 8px 32px rgba(139,92,246,0.6); transform: translateY(-2px); }
    .btn-glow svg { width: 0.8rem; height: 0.8rem; }
    .soc-btn-glass {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: 0.65rem 1rem;
      font-size: 0.8rem; font-weight: 600; color: var(--text-muted);
      text-decoration: none; transition: all 0.2s;
    }
    .soc-btn-glass:hover { border-color: var(--violet); color: var(--violet3); background: rgba(139,92,246,0.1); }
    .soc-btn-glass svg { width: 0.8rem; height: 0.8rem; }

    /* Right column - avatar + stats */
    .hero-right { display: flex; flex-direction: column; gap: 1.25rem; }
    .avatar-wrap {
      aspect-ratio: 3/4; background: linear-gradient(145deg, rgba(139,92,246,0.15), rgba(217,70,239,0.1));
      border: 1px solid var(--glass-border); border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-wrap-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem; opacity: 0.4; }
    .avatar-wrap-placeholder svg { width: 4rem; height: 4rem; color: var(--violet3); }
    .avatar-wrap-placeholder span { font-size: 0.75rem; color: var(--text-muted); }

    .stats-quad { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.625rem; }
    .stat-glass {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: 1rem; text-align: center; transition: border-color 0.2s;
    }
    .stat-glass:hover { border-color: var(--violet); }
    .stat-n { display: block; font-family: var(--font-display); font-style: italic; font-size: 2rem; font-weight: 400; background: linear-gradient(135deg, var(--violet2), var(--fuchsia)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    .stat-l { display: block; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); margin-top: 0.2rem; font-weight: 600; }

    /* Section */
    .section { margin-bottom: 2.5rem; animation: fadeUp 0.6s ease both; }
    .sec-label {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
    }
    .sec-icon {
      width: 2.25rem; height: 2.25rem; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--violet), var(--fuchsia));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sec-icon svg { width: 1rem; height: 1rem; color: white; }
    .sec-title { font-family: var(--font-display); font-style: italic; font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 400; color: var(--text); }
    .sec-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(139,92,246,0.3), transparent); }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 0.75rem; }
    .t-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 1.5rem 1.75rem;
      display: grid; grid-template-columns: auto 1fr; gap: 1.25rem; align-items: start;
      transition: all 0.25s; position: relative; overflow: hidden;
    }
    .t-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, var(--violet), var(--fuchsia)); opacity: 0; transition: opacity 0.25s; }
    .t-card:hover { border-color: rgba(139,92,246,0.3); transform: translateX(4px); }
    .t-card:hover::before { opacity: 1; }

    .t-badge-wrap { display: flex; flex-direction: column; gap: 0.4rem; align-items: flex-start; min-width: 100px; }
    .t-dur-badge { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.3rem 0.625rem; border-radius: 99px; background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.25); color: var(--violet3); white-space: nowrap; }
    .t-type-badge { font-size: 0.62rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(45,212,191,0.1); border: 1px solid rgba(45,212,191,0.2); color: var(--teal); text-transform: uppercase; letter-spacing: 0.06em; }
    @media (max-width: 540px) { .t-card { grid-template-columns: 1fr; } .t-badge-wrap { flex-direction: row; min-width: auto; } }

    .t-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
    .t-sub { font-size: 0.85rem; color: var(--violet3); font-weight: 600; margin-bottom: 0.625rem; }
    .t-desc { font-size: 0.84rem; color: var(--text-muted); line-height: 1.8; }
    .t-score { font-family: var(--font-display); font-style: italic; font-size: 0.9rem; color: var(--gold); margin-top: 0.375rem; }

    /* Projects */
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; }
    .proj-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 1.75rem; position: relative;
      transition: all 0.3s; overflow: hidden;
    }
    .proj-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(139,92,246,0.08) 0%, transparent 60%); opacity: 0; transition: opacity 0.3s; }
    .proj-card:hover { border-color: rgba(139,92,246,0.4); transform: translateY(-6px); box-shadow: 0 20px 60px rgba(139,92,246,0.15); }
    .proj-card:hover::after { opacity: 1; }

    .proj-num { font-family: var(--font-display); font-style: italic; font-size: 3.5rem; font-weight: 300; color: rgba(139,92,246,0.12); line-height: 1; position: absolute; top: 0.75rem; right: 1.25rem; }
    .proj-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; padding-right: 2.5rem; position: relative; z-index: 1; }
    .proj-desc { font-size: 0.84rem; color: var(--text-muted); line-height: 1.75; margin-bottom: 0.875rem; position: relative; z-index: 1; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1rem; position: relative; z-index: 1; }
    .tag { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); color: var(--violet3); }
    .proj-links { display: flex; gap: 0.5rem; position: relative; z-index: 1; }
    .proj-link { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; font-weight: 700; padding: 0.4rem 0.75rem; border-radius: var(--radius-sm); text-decoration: none; border: 1px solid var(--glass-border); color: var(--text-muted); background: var(--glass); transition: all 0.2s; }
    .proj-link:hover { border-color: var(--violet); color: var(--violet3); background: rgba(139,92,246,0.1); }
    .proj-link svg { width: 0.65rem; height: 0.65rem; }

    /* Skills */
    .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .skill-block { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 1.375rem; }
    .skill-cat { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--violet3); margin-bottom: 1rem; padding-bottom: 0.625rem; border-bottom: 1px solid var(--glass-border); }
    .skill-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .skill-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.83rem; color: var(--text-muted); padding: 0.4rem 0.6rem; border-radius: var(--radius-sm); transition: all 0.2s; }
    .skill-item:hover { background: rgba(139,92,246,0.08); color: var(--text); }
    .skill-dot { width: 5px; height: 5px; border-radius: 50%; background: linear-gradient(135deg, var(--violet), var(--fuchsia)); flex-shrink: 0; }

    /* Certs */
    .cert-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
    .cert-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 1.375rem; transition: all 0.25s; }
    .cert-card:hover { border-color: rgba(251,191,36,0.3); box-shadow: 0 4px 24px rgba(251,191,36,0.08); }
    .cert-star { color: var(--gold); margin-bottom: 0.5rem; font-size: 0.875rem; }
    .cert-name { font-size: 0.925rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
    .cert-issuer { font-size: 0.8rem; color: var(--violet3); font-weight: 600; margin-bottom: 0.625rem; }
    .cert-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .cert-link:hover { color: var(--gold); }
    .cert-link svg { width: 0.65rem; height: 0.65rem; }

    /* Interests */
    .interest-flow { display: flex; flex-wrap: wrap; gap: 0.625rem; }
    .interest-pill { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); padding: 0.5rem 1.125rem; border-radius: 99px; border: 1px solid var(--glass-border); background: var(--glass); transition: all 0.25s; }
    .interest-pill:hover { border-color: var(--violet); color: var(--violet3); background: rgba(139,92,246,0.08); }

    /* Footer */
    .footer { margin-top: 4rem; padding-top: 2.5rem; border-top: 1px solid var(--glass-border); text-align: center; }
    .footer-name { font-family: var(--font-display); font-style: italic; font-size: 2.5rem; font-weight: 300; background: linear-gradient(135deg, var(--violet2), var(--fuchsia), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; }
    .footer-links { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .footer-link { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .footer-link:hover { color: var(--violet3); }
    .footer-link svg { width: 0.8rem; height: 0.8rem; }
    .footer-copy { font-size: 0.75rem; color: var(--text-faint); }
  </style>
</head>
<body>
<div class="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="page">
  <nav class="top-nav">
    <span class="nav-logo">Portfolio</span>
    <button class="nav-btn" id="backBtn"><i data-lucide="arrow-left"></i> Back</button>
    <button class="nav-btn" id="homeBtn"><i data-lucide="home"></i> Home</button>
    <span class="nav-spacer"></span>
    <span class="nav-status"><span class="status-dot"></span> Available</span>
  </nav>

  <div class="inner" id="app-root"></div>
</div>

    'Linkedin': `<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`
  };
  function getIconHTML(name) { if(BRAND_SVGS[name]) return BRAND_SVGS[name]; const m={'Globe':'globe','Mail':'mail','Phone':'phone','FileText':'file-text'}; return `<i data-lucide="${m[name]||name.toLowerCase().replace(/([a-z])([A-Z])/g,'$1-$2').toLowerCase()}"></i>`; }
  function buildSocialHref(item) { let l=item.link||""; if(!l) return null; if(item.icon==='Mail'&&!l.startsWith('mailto:')) return `mailto:${l}`; return l; }

  const portfolioData = {
    "profile": {"social":[{"name":"GitHub","link":"https://github.com/example-dev","icon":"Github"},{"name":"LinkedIn","link":"https://linkedin.com/in/example-profile","icon":"Linkedin"},{"name":"Portfolio","link":"https://example.dev","icon":"Globe"}],"cvLink":"#","domain":"Full Stack Developer","email":"user@example.com","location":"San Francisco, CA (Remote)","name":"User Name","phone":"+1 (555) 123-4567","profilePhotoUrl":null,"summary":"Passionate full-stack developer with expertise in building modern web applications. I love creating clean, responsive interfaces and scalable backend systems. Always eager to learn new technologies and contribute to impactful projects."},
    "education":[{"_id":"edu_1","institution":"State University of Technology","course":"M.Sc. in Computer Science","duration":"2022 – 2024","cgpa":"3.9/4.0"},{"_id":"edu_2","institution":"Metro Public School","course":"Higher Secondary Education","duration":"2020 – 2022","percentage":"92.5"}],
    "experience":[{"_id":"exp_1","company":"Digital Innovations Inc.","role":"Full Stack Developer Intern","duration":"6 months","description":"Collaborated on building enterprise web apps using React, Node.js, and MongoDB. Improved API performance by 30% and contributed to code reviews and agile workflows.","type":"Internship"},{"_id":"exp_2","company":"Creative Labs","role":"Frontend Developer (Freelance)","duration":"1 year","description":"Developed responsive websites and interactive dashboards for clients, ensuring cross-browser compatibility and modern UI/UX standards.","type":"Freelance"}],
    "projects":[{"_id":"proj_1","title":"TaskFlow Manager","tech":["MERN","Tailwind","JWT","Redux Toolkit"],"description":"A full-stack productivity app with task boards, real-time updates, and user authentication. Features drag-and-drop and analytics dashboard.","demo":"https://demo-taskflow.example.com","repo":"https://github.com/example/taskflow"},{"_id":"proj_2","title":"WeatherDash","tech":["React","OpenWeather API","Chart.js","CSS Modules"],"description":"Real-time weather dashboard with 7-day forecasts, interactive maps, and location search.","demo":"https://weatherdash.example.com","repo":"https://github.com/example/weatherdash"}],
    "skills":{"skills":[{"category":"Frontend","items":["React","Vue.js","Tailwind CSS","TypeScript"]},{"category":"Backend","items":["Node.js","Express","Python","PostgreSQL","MongoDB"]},{"category":"Tools & DevOps","items":["Git/GitHub","Docker","VS Code","Postman","Vercel"]}]},
    "certifications":[{"_id":"cert_1","name":"Meta Backend Developer Professional","issuer":"Coursera","link":"https://coursera.org/verify/example"},{"_id":"cert_2","name":"AWS Cloud Practitioner","issuer":"Amazon Web Services","link":"https://aws.amazon.com/verification/example"}],
    "interests":{"interests":["Open Source","Cloud Architecture","UI/UX Design","Tech Writing","Hiking","Chess"]}
  };

  function renderApp(data) {
    const p = data.profile;
    const fullName = p.name||'User Name';
    const [fn,...ln] = fullName.split(' '); const lastName = ln.join(' ')||'';
    const socialLinks = (p.social||[]).filter(i=>buildSocialHref(i));
    const edu=data.education, exp=data.experience, proj=data.projects, certs=data.certifications;
    const interestList = data.interests?.interests||[];
    const skills = data.skills?.skills||[];

    const html = `
      <div class="hero">
        <div class="hero-inner">
          <div class="hero-grid">
            <div class="hero-left">
              <div class="eyebrow"><div class="eyebrow-dot"></div><div class="eyebrow-text">${p.domain||'Full Stack Developer'}</div></div>
              <div class="hero-name">${fn}&nbsp;<em>${lastName}</em></div>
              <div class="hero-role">${p.domain||'Full Stack Developer'} · ${p.location||'Remote'}</div>
              ${p.summary ? `<div class="hero-summary-text">${p.summary}</div>` : ''}
              <div class="hero-meta">
                ${p.email ? `<div class="meta-chip"><i data-lucide="mail"></i>${p.email}</div>` : ''}
                ${p.phone ? `<div class="meta-chip"><i data-lucide="phone"></i>${p.phone}</div>` : ''}
                ${p.location ? `<div class="meta-chip"><i data-lucide="map-pin"></i>${p.location}</div>` : ''}
              </div>
              <div class="hero-cta">
                ${p.cvLink ? `<a href="${p.cvLink}" target="_blank" class="btn-glow"><i data-lucide="file-text"></i> Resume</a>` : ''}
                ${socialLinks.map(item=>`<a href="${buildSocialHref(item)}" target="_blank" class="soc-btn-glass">${getIconHTML(item.icon)}${item.name}</a>`).join('')}
              </div>
            </div>
            <div class="hero-right">
              <div class="avatar-wrap">
                ${p.profilePhotoUrl ? `<img src="${p.profilePhotoUrl}" alt="${fullName}">` : `<div class="avatar-wrap-placeholder"><i data-lucide="user"></i><span>Add Photo</span></div>`}
              </div>
              <div class="stats-quad">
                <div class="stat-glass"><span class="stat-n">${edu.length}</span><span class="stat-l">Education</span></div>
                <div class="stat-glass"><span class="stat-n">${exp.length}</span><span class="stat-l">Roles</span></div>
                <div class="stat-glass"><span class="stat-n">${proj.length}</span><span class="stat-l">Projects</span></div>
                <div class="stat-glass"><span class="stat-n">${certs.length}</span><span class="stat-l">Certs</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Education -->
      <div class="section">
        <div class="sec-label"><div class="sec-icon"><i data-lucide="book-open"></i></div><div class="sec-title">Education</div><div class="sec-line"></div></div>
        <div class="timeline">
          ${edu.map(e=>{const score=e.cgpa?`CGPA: ${e.cgpa}`:(e.percentage?`Score: ${e.percentage}%`:null); return `<div class="t-card">
            <div class="t-badge-wrap"><div class="t-dur-badge">${e.duration||'N/A'}</div></div>
            <div>
              <div class="t-title">${e.institution}</div>
              <div class="t-sub">${e.course}</div>
              ${score?`<div class="t-score">${score}</div>`:''}
            </div>
          </div>`;}).join('')}
        </div>
      </div>

      <!-- Experience -->
      <div class="section">
        <div class="sec-label"><div class="sec-icon"><i data-lucide="briefcase"></i></div><div class="sec-title">Experience</div><div class="sec-line"></div></div>
        <div class="timeline">
          ${exp.map(e=>`<div class="t-card">
            <div class="t-badge-wrap">
              <div class="t-dur-badge">${e.duration||'N/A'}</div>
              ${e.type?`<div class="t-type-badge">${e.type}</div>`:''}
            </div>
            <div>
              <div class="t-title">${e.role}</div>
              <div class="t-sub">${e.company}</div>
              ${e.description?`<div class="t-desc">${e.description}</div>`:''}
            </div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Projects -->
      <div class="section">
        <div class="sec-label"><div class="sec-icon"><i data-lucide="code-2"></i></div><div class="sec-title">Projects</div><div class="sec-line"></div></div>
        <div class="proj-grid">
          ${proj.map((pr,i)=>`<div class="proj-card">
            <div class="proj-num">0${i+1}</div>
            <div class="proj-title">${pr.title}</div>
            ${pr.description?`<div class="proj-desc">${pr.description}</div>`:''}
            ${pr.tech?.length?`<div class="tag-row">${pr.tech.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
            <div class="proj-links">
              ${pr.demo?`<a href="${pr.demo}" target="_blank" class="proj-link">Live <i data-lucide="arrow-up-right"></i></a>`:''}
              ${pr.repo?`<a href="${pr.repo}" target="_blank" class="proj-link">Repo ${BRAND_SVGS['Github']}</a>`:''}
            </div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Skills -->
      <div class="section">
        <div class="sec-label"><div class="sec-icon"><i data-lucide="layers"></i></div><div class="sec-title">Skills</div><div class="sec-line"></div></div>
        <div class="skill-grid">
          ${skills.map(cat=>`<div class="skill-block">
            <div class="skill-cat">${cat.category}</div>
            <div class="skill-list">${cat.items.map(item=>`<div class="skill-item"><div class="skill-dot"></div>${item}</div>`).join('')}</div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Certifications -->
      <div class="section">
        <div class="sec-label"><div class="sec-icon"><i data-lucide="award"></i></div><div class="sec-title">Certifications</div><div class="sec-line"></div></div>
        <div class="cert-grid">
          ${certs.map(c=>`<div class="cert-card">
            <div class="cert-star">★ Verified</div>
            <div class="cert-name">${c.name}</div>
            <div class="cert-issuer">${c.issuer}</div>
            ${c.link?`<a href="${c.link}" target="_blank" class="cert-link">View credential <i data-lucide="arrow-up-right"></i></a>`:''}
          </div>`).join('')}
        </div>
      </div>

      ${interestList.length?`<div class="section">
        <div class="sec-label"><div class="sec-icon"><i data-lucide="sparkles"></i></div><div class="sec-title">Interests</div><div class="sec-line"></div></div>
        <div class="interest-flow">${interestList.map(i=>`<div class="interest-pill">${i}</div>`).join('')}</div>
      </div>`:''}

      <footer class="footer">
        <div class="footer-name">${fullName}</div>
        <div class="footer-links">
          ${p.email?`<a href="mailto:${p.email}" class="footer-link"><i data-lucide="mail"></i>${p.email}</a>`:''}
          ${socialLinks.map(item=>`<a href="${buildSocialHref(item)}" target="_blank" class="footer-link">${getIconHTML(item.icon)}${item.name}</a>`).join('')}
        </div>
        <div class="footer-copy">© ${new Date().getFullYear()} ${fullName} · Crafted with passion</div>
      </footer>
    `;
    document.getElementById('app-root').innerHTML = html;
    if(typeof lucide!=='undefined') lucide.createIcons(); else setTimeout(()=>lucide.createIcons(),100);
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>renderApp(portfolioData));
  else renderApp(portfolioData);
  document.getElementById('backBtn').addEventListener('click',()=>window.history.back());
  document.getElementById('homeBtn').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
</script>
</body>
</html>
