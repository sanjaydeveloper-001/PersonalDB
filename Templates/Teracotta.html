<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>User Name · Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --terra: #c4622d; --terra-deep: #9e4520; --terra-light: #e8956b; --terra-ghost: #fdf1eb;
      --sand: #f7f0e6; --warm-white: #fffcf8; --cream: #f2e8d9;
      --rust: #8b3a1a; --amber: #d97706;
      --ink: #2c1a0e; --soft: #5c3d2a; --muted: #8a6550; --faint: #b89880;
      --line: rgba(196,98,45,0.18);
      --font-display: 'Libre Baskerville', Georgia, serif;
      --font-body: 'Nunito', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--sand); color: var(--ink); font-family: var(--font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    @keyframes riseIn { from { opacity: 0; transform: translateY(30px) rotate(-1deg); } to { opacity: 1; transform: translateY(0) rotate(0deg); } }

    .top-nav { padding: 1.5rem 3rem 0; display: flex; align-items: center; gap: 1.5rem; }
    .nav-btn { display: inline-flex; align-items: center; gap: 0.4rem; font-family: var(--font-body); font-size: 0.8rem; font-weight: 700; color: var(--terra); background: transparent; border: none; cursor: pointer; transition: all 0.2s; }
    .nav-btn:hover { color: var(--terra-deep); }
    .nav-btn svg { width: 0.85rem; height: 0.85rem; }
    .nav-divider { width: 1px; height: 1rem; background: var(--line); }

    .page-wrap { max-width: 1120px; margin: 0 auto; padding: 0 3rem 6rem; }
    @media(max-width:640px) { .page-wrap { padding: 0 1.25rem 4rem; } .top-nav { padding: 1.25rem 1.25rem 0; } }

    /* HERO */
    .hero { padding: 3.5rem 0 3rem; display: flex; flex-direction: column; gap: 0; animation: riseIn 0.8s cubic-bezier(0.34,1.2,0.64,1) both; }

    .hero-arch {
      background: var(--terra); border-radius: 50% 50% 0 0 / 60% 60% 0 0;
      padding: 4rem 3rem 3rem; text-align: center;
      position: relative; overflow: hidden;
    }
    .arch-pattern {
      position: absolute; inset: 0; opacity: 0.08;
      background-image: radial-gradient(circle at 20px 20px, rgba(255,255,255,0.5) 2px, transparent 2px);
      background-size: 40px 40px;
    }
    .arch-inner { position: relative; z-index: 1; }
    .arch-avatar {
      width: 130px; height: 130px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 4px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem; overflow: hidden;
    }
    .arch-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .arch-avatar svg { width: 3.5rem; height: 3.5rem; color: rgba(255,255,255,0.7); }
    .arch-name { font-family: var(--font-display); font-size: clamp(2.25rem, 5vw, 3.75rem); font-weight: 700; color: white; line-height: 1.1; margin-bottom: 0.5rem; }
    .arch-name em { font-style: italic; font-weight: 400; opacity: 0.9; }
    .arch-domain { font-size: 0.875rem; color: rgba(255,255,255,0.8); font-weight: 500; margin-bottom: 1.5rem; }
    .arch-socials { display: flex; justify-content: center; gap: 0.65rem; flex-wrap: wrap; }
    .arch-social { display: inline-flex; align-items: center; justify-content: center; width: 2.25rem; height: 2.25rem; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.4); color: rgba(255,255,255,0.85); text-decoration: none; transition: all 0.25s; }
    .arch-social:hover { background: rgba(255,255,255,0.2); border-color: white; color: white; }
    .arch-social svg { width: 0.9rem; height: 0.9rem; }
    .arch-resume { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.55rem 1.25rem; background: white; color: var(--terra); border-radius: 99px; font-size: 0.8rem; font-weight: 700; text-decoration: none; margin-left: 0.25rem; transition: all 0.25s; }
    .arch-resume:hover { background: var(--cream); transform: translateY(-2px); }

    .hero-meta-strip {
      background: var(--cream); border: 1.5px solid var(--line); border-top: none;
      border-radius: 0 0 1.5rem 1.5rem; padding: 1.25rem 2.5rem;
      display: flex; justify-content: center; gap: 3rem; flex-wrap: wrap;
    }
    .meta-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.825rem; color: var(--muted); }
    .meta-item svg { width: 0.85rem; height: 0.85rem; color: var(--terra); }

    .stats-row {
      display: flex; gap: 1.25rem; margin-top: 1.5rem; flex-wrap: wrap;
    }
    .stat-terr { flex: 1; min-width: 100px; background: var(--warm-white); border: 1.5px solid var(--line); border-radius: 1rem; padding: 1.25rem; text-align: center; }
    .stat-n { display: block; font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--terra); line-height: 1; }
    .stat-l { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); }

    /* SUMMARY */
    .summary-scroll {
      background: var(--warm-white); border: 1.5px solid var(--line); border-radius: 1.5rem;
      padding: 2.25rem 2.5rem; margin: 2.5rem 0; position: relative;
    }
    .summary-scroll::before { content: '"'; font-family: var(--font-display); font-size: 6rem; color: var(--terra); opacity: 0.15; position: absolute; top: -1rem; left: 1.25rem; line-height: 1; }
    .summary-txt { font-family: var(--font-display); font-size: clamp(1rem, 2vw, 1.15rem); font-style: italic; color: var(--soft); line-height: 1.9; position: relative; z-index: 1; }

    /* SECTION */
    .section { margin-bottom: 3.5rem; }
    .sec-hd { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .sec-stripe { width: 4px; height: 2rem; background: var(--terra); border-radius: 99px; flex-shrink: 0; }
    .sec-title { font-family: var(--font-display); font-size: clamp(1.5rem, 3.5vw, 2rem); font-weight: 700; color: var(--ink); }
    .sec-title em { font-style: italic; color: var(--terra); }
    .sec-rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }

    /* TIMELINE */
    .tl-terra { display: flex; flex-direction: column; gap: 1.5rem; }
    .tl-card {
      background: var(--warm-white); border: 1.5px solid var(--line); border-radius: 1.25rem;
      padding: 1.75rem; display: grid; grid-template-columns: auto 1fr;
      gap: 1.5rem; align-items: start; transition: all 0.3s;
    }
    .tl-card:hover { box-shadow: 0 8px 32px rgba(196,98,45,0.1); transform: translateX(4px); border-color: var(--terra-light); }
    .tl-icon { width: 2.75rem; height: 2.75rem; border-radius: 0.875rem; background: var(--terra-ghost); border: 1.5px solid var(--line); display: flex; align-items: center; justify-content: center; color: var(--terra); flex-shrink: 0; }
    .tl-icon svg { width: 1.1rem; height: 1.1rem; }
    .tl-dur { display: inline-block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--terra); background: var(--terra-ghost); padding: 0.22rem 0.65rem; border-radius: 99px; margin-bottom: 0.5rem; }
    .tl-title { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; color: var(--ink); margin-bottom: 0.2rem; }
    .tl-sub { font-size: 0.85rem; color: var(--terra); font-weight: 600; margin-bottom: 0.5rem; }
    .tl-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.75; }
    .tl-score { font-size: 0.75rem; color: var(--faint); margin-top: 0.35rem; }

    /* PROJECTS */
    .proj-stack { display: flex; flex-direction: column; gap: 1.25rem; }
    .proj-card {
      background: var(--warm-white); border: 1.5px solid var(--line); border-radius: 1.5rem;
      padding: 2rem; display: grid; grid-template-columns: 1fr 140px;
      gap: 2rem; align-items: start; transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .proj-card::before { content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: linear-gradient(to bottom, var(--terra), var(--terra-light)); }
    .proj-card:hover { box-shadow: 0 12px 40px rgba(196,98,45,0.12); transform: translateY(-3px); }
    @media(max-width:640px) { .proj-card { grid-template-columns: 1fr; } }
    .proj-n { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--terra); margin-bottom: 0.5rem; }
    .proj-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--ink); margin-bottom: 0.5rem; }
    .proj-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.75; margin-bottom: 1rem; }
    .proj-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .proj-tag { font-size: 0.68rem; font-weight: 700; color: var(--terra); background: var(--terra-ghost); border: 1px solid var(--line); padding: 0.22rem 0.6rem; border-radius: 0.35rem; }
    .proj-links { display: flex; flex-direction: column; gap: 0.6rem; align-items: flex-end; }
    .proj-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; font-weight: 700; color: var(--terra); border: 1.5px solid var(--line); padding: 0.45rem 0.875rem; border-radius: 0.75rem; text-decoration: none; transition: all 0.25s; white-space: nowrap; }
    .proj-link:hover { background: var(--terra); color: white; border-color: var(--terra); }
    .proj-link svg { width: 0.65rem; height: 0.65rem; }

    /* SKILLS */
    .skills-terra { display: flex; flex-direction: column; gap: 1.25rem; }
    .skill-row-item { background: var(--warm-white); border: 1.5px solid var(--line); border-radius: 1.25rem; padding: 1.5rem; }
    .skill-head { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .skill-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--terra); flex-shrink: 0; }
    .skill-cat { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--terra); }
    .skill-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .skill-chip { font-size: 0.875rem; color: var(--soft); background: var(--cream); border: 1px solid var(--line); padding: 0.4rem 0.875rem; border-radius: 99px; }

    /* CERTS */
    .cert-mosaic { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.1rem; }
    .cert-card { background: var(--warm-white); border: 1.5px solid var(--line); border-radius: 1.25rem; padding: 1.5rem; transition: all 0.25s; }
    .cert-card:hover { box-shadow: 0 8px 28px rgba(196,98,45,0.1); border-color: var(--terra-light); transform: translateY(-3px); }
    .cert-star { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .cert-nm { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 0.25rem; }
    .cert-iss { font-size: 0.8rem; font-weight: 700; color: var(--terra); }
    .cert-lnk { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-decoration: none; margin-top: 0.6rem; transition: color 0.2s; }
    .cert-lnk:hover { color: var(--terra); }
    .cert-lnk svg { width: 0.65rem; height: 0.65rem; }

    /* INTERESTS */
    .int-row { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .int-pill { font-size: 0.9rem; font-weight: 600; color: var(--soft); background: var(--warm-white); border: 2px solid var(--line); padding: 0.6rem 1.4rem; border-radius: 99px; transition: all 0.25s; cursor: default; }
    .int-pill:hover { background: var(--terra-ghost); border-color: var(--terra); color: var(--terra); }

    /* FOOTER */
    .footer { margin-top: 3rem; padding: 2.5rem 0; border-top: 1.5px solid var(--line); display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }
    .footer-socials { display: flex; gap: 0.65rem; }
    .footer-contacts { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .footer-contacts a { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-contacts a:hover { color: var(--terra); }
    .footer-contacts a svg { width: 0.85rem; height: 0.85rem; }
    .footer-copy { font-size: 0.75rem; color: var(--faint); }
  </style>
</head>
<body>
<div class="top-nav">
  <button class="nav-btn" id="backBtn"><i data-lucide="chevron-left"></i>Back</button>
  <span class="nav-divider"></span>
  <button class="nav-btn" id="homeBtn"><i data-lucide="home"></i>Home</button>
</div>
<div class="page-wrap" id="app-root"></div>
<script>
  function initializeLucideIcons() { if(typeof lucide!=='undefined'&&lucide.createIcons) lucide.createIcons(); else setTimeout(initializeLucideIcons,50); }
  const portfolioData = { "profile": { "social": [ { "name": "GitHub", "link": "https://github.com/example-dev", "icon": "Github", "color": "#c4622d" }, { "name": "LinkedIn", "link": "https://linkedin.com/in/example-profile", "icon": "Linkedin", "color": "#c4622d" }, { "name": "Portfolio", "link": "https://example.dev", "icon": "Globe", "color": "#c4622d" } ], "cvLink": "#", "domain": "Full Stack Developer", "email": "user@example.com", "location": "San Francisco, CA (Remote)", "name": "User Name", "phone": "+1 (555) 123-4567", "profilePhotoUrl": null, "summary": "Passionate full-stack developer with expertise in building modern web applications. I love creating clean, responsive interfaces and scalable backend systems. Always eager to learn new technologies and contribute to impactful projects." }, "education": [ { "_id": "edu_1", "institution": "State University of Technology", "course": "M.Sc. in Computer Science", "duration": "2022 – 2024", "cgpa": "3.9/4.0", "percentage": "" }, { "_id": "edu_2", "institution": "Metro Public School", "course": "Higher Secondary Education", "duration": "2020 – 2022", "cgpa": "", "percentage": "92.5" } ], "experience": [ { "_id": "exp_1", "company": "Digital Innovations Inc.", "role": "Full Stack Developer Intern", "duration": "6 months", "description": "Collaborated on building enterprise web apps using React, Node.js, and MongoDB. Improved API performance by 30% and contributed to code reviews and agile workflows.", "type": "Internship" }, { "_id": "exp_2", "company": "Creative Labs", "role": "Frontend Developer (Freelance)", "duration": "1 year", "description": "Developed responsive websites and interactive dashboards for clients, ensuring cross-browser compatibility and modern UI/UX standards.", "type": "Freelance" } ], "projects": [ { "_id": "proj_1", "title": "TaskFlow Manager", "tech": ["MERN", "Tailwind", "JWT", "Redux Toolkit"], "description": "A full-stack productivity app with task boards, real-time updates, and user authentication. Features drag-and-drop and analytics dashboard.", "demo": "https://demo-taskflow.example.com", "repo": "https://github.com/example/taskflow" }, { "_id": "proj_2", "title": "WeatherDash", "tech": ["React", "OpenWeather API", "Chart.js", "CSS Modules"], "description": "Real-time weather dashboard with 7-day forecasts, interactive maps, and location search.", "demo": "https://weatherdash.example.com", "repo": "https://github.com/example/weatherdash" } ], "skills": { "skills": [ { "category": "Frontend", "items": ["React", "Vue.js", "Tailwind CSS", "TypeScript"] }, { "category": "Backend", "items": ["Node.js", "Express", "Python", "PostgreSQL", "MongoDB"] }, { "category": "Tools & DevOps", "items": ["Git/GitHub", "Docker", "VS Code", "Postman", "Vercel"] } ] }, "certifications": [ { "_id": "cert_1", "name": "Meta Backend Developer Professional", "issuer": "Coursera", "link": "https://coursera.org/verify/example" }, { "_id": "cert_2", "name": "AWS Cloud Practitioner", "issuer": "Amazon Web Services", "link": "https://aws.amazon.com/verification/example" } ], "interests": { "interests": ["Open Source", "Cloud Architecture", "UI/UX Design", "Tech Writing", "Hiking", "Chess"] } };
  const BRAND_SVGS = { 'Github': `<svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>`, 'Linkedin': `<svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>` };
  function getIconHTML(n) { if(BRAND_SVGS[n]) return BRAND_SVGS[n]; const m={'Globe':'globe','Mail':'mail','Phone':'phone','FileText':'file-text','MapPin':'map-pin'}; return `<i data-lucide="${m[n]||n.toLowerCase().replace(/([a-z])([A-Z])/g,'$1-$2').toLowerCase()}"></i>`; }
  function buildSocialHref(item) { let l=item.link||""; if(!l) return null; if(item.icon==='Mail'&&!l.startsWith('mailto:')) return `mailto:${l}`; return l; }
  function renderApp(data) {
    const p=data.profile, fullName=p.name||'User Name';
    const [firstName,...lastParts]=fullName.split(' ');
    const lastName=lastParts.join(' ')||'';
    const socialLinks=(p.social||[]).filter(i=>buildSocialHref(i));
    const cvLink=p.cvLink?.trim()||null;
    const eduC=data.education.length,expC=data.experience.length,projC=data.projects.length,certC=data.certifications.length;
    const photoUrl=p.profilePhotoUrl||null;
    const html=`
    <div class="hero">
      <div class="hero-arch">
        <div class="arch-pattern"></div>
        <div class="arch-inner">
          <div class="arch-avatar">${photoUrl?`<img src="${photoUrl}" alt="${fullName}">`:`<i data-lucide="user"></i>`}</div>
          <div class="arch-name">${firstName} <em>${lastName}</em></div>
          <div class="arch-domain">${p.domain||'Full Stack Developer'} · ${p.location||'Remote'}</div>
          <div class="arch-socials">
            ${socialLinks.map(item=>{const href=buildSocialHref(item);return href?`<a href="${href}" target="_blank" class="arch-social" title="${item.name}">${getIconHTML(item.icon)}</a>`:''}).join('')}
            ${cvLink?`<a href="${cvLink}" target="_blank" class="arch-resume"><i data-lucide="file-text"></i>Resume</a>`:''}
          </div>
        </div>
      </div>
      <div class="hero-meta-strip">
        ${p.email?`<div class="meta-item"><i data-lucide="mail"></i><span>${p.email}</span></div>`:''}
        ${p.phone?`<div class="meta-item"><i data-lucide="phone"></i><span>${p.phone}</span></div>`:''}
        ${p.location?`<div class="meta-item"><i data-lucide="map-pin"></i><span>${p.location}</span></div>`:''}
      </div>
      <div class="stats-row">
        <div class="stat-terr"><span class="stat-n">${eduC}</span><span class="stat-l">Education</span></div>
        <div class="stat-terr"><span class="stat-n">${expC}</span><span class="stat-l">Roles</span></div>
        <div class="stat-terr"><span class="stat-n">${projC}</span><span class="stat-l">Projects</span></div>
        <div class="stat-terr"><span class="stat-n">${certC}</span><span class="stat-l">Certs</span></div>
      </div>
    </div>
    ${p.summary?`<div class="summary-scroll"><div class="summary-txt">${p.summary.trim()}</div></div>`:''}
    <div class="section">
      <div class="sec-hd"><div class="sec-stripe"></div><h2 class="sec-title">Education</h2><div class="sec-rule"></div></div>
      <div class="tl-terra">${data.education.map(edu=>`<div class="tl-card"><div class="tl-icon"><i data-lucide="book-open"></i></div><div><span class="tl-dur">${edu.duration||''}</span><div class="tl-title">${edu.institution}</div><div class="tl-sub">${edu.course}</div>${edu.cgpa?`<div class="tl-score">CGPA: ${edu.cgpa}</div>`:edu.percentage?`<div class="tl-score">${edu.percentage}%</div>`:''}</div></div>`).join('')}</div>
    </div>
    <div class="section">
      <div class="sec-hd"><div class="sec-stripe"></div><h2 class="sec-title">Experience</h2><div class="sec-rule"></div></div>
      <div class="tl-terra">${data.experience.map(exp=>`<div class="tl-card"><div class="tl-icon"><i data-lucide="briefcase"></i></div><div><span class="tl-dur">${exp.duration||''}${exp.type?` · ${exp.type}`:''}</span><div class="tl-title">${exp.role}</div><div class="tl-sub">${exp.company}</div>${exp.description?`<div class="tl-desc">${exp.description}</div>`:''}</div></div>`).join('')}</div>
    </div>
    <div class="section">
      <div class="sec-hd"><div class="sec-stripe"></div><h2 class="sec-title"><em>Projects</em></h2><div class="sec-rule"></div></div>
      <div class="proj-stack">${data.projects.map((proj,idx)=>`<div class="proj-card"><div><div class="proj-n">№ ${String(idx+1).padStart(2,'0')}</div><div class="proj-title">${proj.title}</div>${proj.description?`<div class="proj-desc">${proj.description}</div>`:''}<div class="proj-tags">${(proj.tech||[]).map(t=>`<span class="proj-tag">${t}</span>`).join('')}</div></div><div class="proj-links">${proj.demo?`<a href="${proj.demo}" target="_blank" class="proj-link">Live <i data-lucide="arrow-up-right"></i></a>`:''}${proj.repo?`<a href="${proj.repo}" target="_blank" class="proj-link">Code <i data-lucide="github"></i></a>`:''}</div></div>`).join('')}</div>
    </div>
    <div class="section">
      <div class="sec-hd"><div class="sec-stripe"></div><h2 class="sec-title">Skills</h2><div class="sec-rule"></div></div>
      <div class="skills-terra">${(data.skills?.skills||[]).map(cat=>`<div class="skill-row-item"><div class="skill-head"><div class="skill-dot"></div><div class="skill-cat">${cat.category}</div></div><div class="skill-chips">${cat.items.map(item=>`<span class="skill-chip">${item}</span>`).join('')}</div></div>`).join('')}</div>
    </div>
    <div class="section">
      <div class="sec-hd"><div class="sec-stripe"></div><h2 class="sec-title">Certifications</h2><div class="sec-rule"></div></div>
      <div class="cert-mosaic">${data.certifications.map(cert=>`<div class="cert-card"><div class="cert-star">🏺</div><div class="cert-nm">${cert.name}</div><div class="cert-iss">${cert.issuer}</div>${cert.link?`<a href="${cert.link}" target="_blank" class="cert-lnk">View Credential <i data-lucide="arrow-up-right"></i></a>`:''}</div>`).join('')}</div>
    </div>
    ${data.interests?.interests?.length?`<div class="section"><div class="sec-hd"><div class="sec-stripe"></div><h2 class="sec-title">Interests</h2><div class="sec-rule"></div></div><div class="int-row">${data.interests.interests.map(i=>`<div class="int-pill">${i}</div>`).join('')}</div></div>`:''}
    <footer class="footer">
      <div class="footer-socials">${socialLinks.map(item=>{const href=buildSocialHref(item);return href?`<a href="${href}" target="_blank" class="arch-social" title="${item.name}">${getIconHTML(item.icon)}</a>`:''}).join('')}</div>
      <div class="footer-contacts">${p.email?`<a href="mailto:${p.email}"><i data-lucide="mail"></i>${p.email}</a>`:''} ${p.phone?`<a href="tel:${p.phone}"><i data-lucide="phone"></i>${p.phone}</a>`:''}</div>
      <div class="footer-copy">© ${new Date().getFullYear()} ${fullName}</div>
    </footer>`;
    document.getElementById('app-root').innerHTML=html;
    initializeLucideIcons();
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>renderApp(portfolioData));
  else renderApp(portfolioData);
  document.getElementById('backBtn').addEventListener('click',()=>window.history.back());
  document.getElementById('homeBtn').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
</script>
</body>
</html>
