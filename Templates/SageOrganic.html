        </div>
        <div class="hero-actions">
          ${socialLinks.map(item=>{const href=buildSocialHref(item);return href?`<a href="${href}" target="_blank" class="social-icon" title="${item.name}">${getIconHTML(item.icon)}</a>`:''}).join('')}
          ${cvLink?`<a href="${cvLink}" target="_blank" class="resume-btn"><i data-lucide="file-text"></i>Resume</a>`:''}
        </div>
      </div>
      <div class="hero-visual">
        <div class="avatar-wrap">
          <div class="avatar-ring-outer"></div>
          ${photoUrl?`<img src="${photoUrl}" alt="${fullName}">`:`<div class="avatar-placeholder-icon"><i data-lucide="user"></i></div>`}
        </div>
        <div class="stats-organic">
          <div class="stat-bubble"><span class="stat-num">${eduC}</span><span class="stat-lbl">Education</span></div>
          <div class="stat-bubble"><span class="stat-num">${expC}</span><span class="stat-lbl">Roles</span></div>
          <div class="stat-bubble"><span class="stat-num">${projC}</span><span class="stat-lbl">Projects</span></div>
          <div class="stat-bubble"><span class="stat-num">${certC}</span><span class="stat-lbl">Certs</span></div>
        </div>
      </div>
    </div>
    ${p.summary?`<div class="section"><div class="summary-card"><div class="summary-quote">${p.summary.trim()}</div></div></div>`:''}
    <div class="section">
      <div class="section-hd"><div class="hd-icon"><i data-lucide="book-open"></i></div><h2 class="hd-title">Education</h2><div class="hd-line"></div></div>
      <div class="tl">${data.education.map((edu,idx)=>`<div class="tl-item"><div class="tl-spine"><div class="tl-dot"></div>${idx<data.education.length-1?'<div class="tl-line"></div>':''}</div><div class="tl-card"><span class="tl-dur">${edu.duration||''}</span><div class="tl-title">${edu.institution}</div><div class="tl-sub">${edu.course}</div>${edu.cgpa?`<div class="tl-score">CGPA: ${edu.cgpa}</div>`:edu.percentage?`<div class="tl-score">${edu.percentage}%</div>`:''}</div></div>`).join('')}</div>
    </div>
    <div class="section">
      <div class="section-hd"><div class="hd-icon"><i data-lucide="briefcase"></i></div><h2 class="hd-title">Experience</h2><div class="hd-line"></div></div>
      <div class="tl">${data.experience.map((exp,idx)=>`<div class="tl-item"><div class="tl-spine"><div class="tl-dot"></div>${idx<data.experience.length-1?'<div class="tl-line"></div>':''}</div><div class="tl-card"><span class="tl-dur">${exp.duration||''}${exp.type?` · ${exp.type}`:''}</span><div class="tl-title">${exp.role}</div><div class="tl-sub">${exp.company}</div>${exp.description?`<div class="tl-desc">${exp.description}</div>`:''}</div></div>`).join('')}</div>
    </div>
    <div class="section">
      <div class="section-hd"><div class="hd-icon"><i data-lucide="code-2"></i></div><h2 class="hd-title"><em>Featured</em> Projects</h2><div class="hd-line"></div></div>
      <div class="proj-mosaic">${data.projects.map((proj,idx)=>`<div class="proj-card"><div><div class="proj-num">Project 0${idx+1}</div><div class="proj-title">${proj.title}</div>${proj.description?`<div class="proj-desc">${proj.description}</div>`:''}<div class="proj-tags">${(proj.tech||[]).map(t=>`<span class="proj-tag">${t}</span>`).join('')}</div></div><div class="proj-links">${proj.demo?`<a href="${proj.demo}" target="_blank" class="proj-link">Live <i data-lucide="arrow-up-right"></i></a>`:''}${proj.repo?`<a href="${proj.repo}" target="_blank" class="proj-link">Code <i data-lucide="github"></i></a>`:''}</div></div>`).join('')}</div>
    </div>
    <div class="section">
      <div class="section-hd"><div class="hd-icon"><i data-lucide="layers"></i></div><h2 class="hd-title">Skills</h2><div class="hd-line"></div></div>
      <div class="skills-organic">${(data.skills?.skills||[]).map(cat=>`<div class="skill-block"><div class="skill-block-head"><div class="skill-block-leaf"></div><div class="skill-block-title">${cat.category}</div></div><div class="skill-chips">${cat.items.map(item=>`<span class="skill-chip">${item}</span>`).join('')}</div></div>`).join('')}</div>
    </div>
    <div class="section">
      <div class="section-hd"><div class="hd-icon"><i data-lucide="award"></i></div><h2 class="hd-title">Certifications</h2><div class="hd-line"></div></div>
      <div class="cert-grid">${data.certifications.map(cert=>`<div class="cert-card"><div class="cert-badge">🌿</div><div class="cert-nm">${cert.name}</div><div class="cert-iss">${cert.issuer}</div>${cert.link?`<a href="${cert.link}" target="_blank" class="cert-lnk">View Credential <i data-lucide="arrow-up-right"></i></a>`:''}</div>`).join('')}</div>
    </div>
    ${data.interests?.interests?.length?`<div class="section"><div class="section-hd"><div class="hd-icon"><i data-lucide="sparkles"></i></div><h2 class="hd-title">Interests</h2><div class="hd-line"></div></div><div class="interest-garden">${data.interests.interests.map(i=>`<div class="int-pill">${i}</div>`).join('')}</div></div>`:''}
    <footer class="footer">
      <div class="footer-socials">${socialLinks.map(item=>{const href=buildSocialHref(item);return href?`<a href="${href}" target="_blank" class="social-icon" title="${item.name}">${getIconHTML(item.icon)}</a>`:''}).join('')}</div>
      <div class="footer-contacts">${p.email?`<a href="mailto:${p.email}"><i data-lucide="mail"></i>${p.email}</a>`:''} ${p.phone?`<a href="tel:${p.phone}"><i data-lucide="phone"></i>${p.phone}</a>`:''}</div>
      <div class="footer-copy">© ${new Date().getFullYear()} ${fullName} · Built with care</div>
    </footer>`;
    document.getElementById('app-root').innerHTML = html;
    initializeLucideIcons();
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>renderApp(portfolioData));
  else renderApp(portfolioData);
  document.getElementById('backBtn').addEventListener('click',()=>window.history.back());
  document.getElementById('homeBtn').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
</script>
</body>
</html>
