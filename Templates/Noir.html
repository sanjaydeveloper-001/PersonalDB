    .footer-contact a:hover { color: var(--gold); }

    .copyright { font-size: 0.7rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.2); margin-top: 2rem; text-align: center; }

        </div>
      </div>` : ''}
      <div class="gold-rule"></div>
      <div class="section-head"><span class="section-num">01</span><h2 class="section-title">Education</h2></div>
      <div class="timeline-list">${data.education.map(edu => `
        <div class="tl-item">
          <div class="tl-date">${edu.duration || ''}</div>
          <div class="tl-body">
            <div class="tl-title">${edu.institution}</div>
            <div class="tl-sub">${edu.course}</div>
            ${edu.cgpa ? `<div class="tl-score">CGPA: ${edu.cgpa}</div>` : edu.percentage ? `<div class="tl-score">${edu.percentage}%</div>` : ''}
          </div>
        </div>`).join('')}</div>
      <div class="gold-rule"></div>
      <div class="section-head"><span class="section-num">02</span><h2 class="section-title">Experience</h2></div>
      <div class="timeline-list">${data.experience.map(exp => `
        <div class="tl-item">
          <div class="tl-date">${exp.duration || ''}${exp.type ? ` · ${exp.type}` : ''}</div>
          <div class="tl-body">
            <div class="tl-title">${exp.role}</div>
            <div class="tl-sub">${exp.company}</div>
            ${exp.description ? `<div class="tl-desc">${exp.description}</div>` : ''}
          </div>
        </div>`).join('')}</div>
      <div class="gold-rule"></div>
      <div class="section-head"><span class="section-num">03</span><h2 class="section-title"><em>Selected</em> Projects</h2></div>
      <div class="project-list">${data.projects.map((proj, idx) => `
        <div class="proj-item">
          <div class="proj-num-big">0${idx+1}</div>
          <div class="proj-content">
            <div class="proj-title">${proj.title}</div>
            ${proj.description ? `<div class="proj-desc">${proj.description}</div>` : ''}
            ${proj.tech?.length ? `<div class="proj-tags">${proj.tech.map(t => `<span class="proj-tag">${t}</span>`).join('')}</div>` : ''}
          </div>
          <div class="proj-links">
            ${proj.demo ? `<a href="${proj.demo}" target="_blank" class="proj-link">Live <i data-lucide="arrow-up-right"></i></a>` : ''}
            ${proj.repo ? `<a href="${proj.repo}" target="_blank" class="proj-link">Repo <i data-lucide="github"></i></a>` : ''}
          </div>
        </div>`).join('')}</div>
      <div class="gold-rule"></div>
      <div class="section-head"><span class="section-num">04</span><h2 class="section-title">Skills</h2></div>
      <div class="skills-editorial">${(data.skills?.skills || []).map(cat => `
        <div class="skill-col">
          <div class="skill-col-title">${cat.category}</div>
          <div class="skill-list">${cat.items.map(item => `<div class="skill-entry"><span>${item}</span><div class="skill-dash"></div></div>`).join('')}</div>
        </div>`).join('')}</div>
      <div class="gold-rule"></div>
      <div class="section-head"><span class="section-num">05</span><h2 class="section-title">Certifications</h2></div>
      <div class="certs-list">${data.certifications.map(cert => `
        <div class="cert-row">
          <div><div class="cert-name">${cert.name}</div><div class="cert-issuer">${cert.issuer}</div></div>
          ${cert.link ? `<a href="${cert.link}" target="_blank" class="cert-link">Credential <i data-lucide="arrow-up-right"></i></a>` : ''}
        </div>`).join('')}</div>
      ${data.interests?.interests?.length ? `
      <div class="gold-rule"></div>
      <div class="section-head"><span class="section-num">06</span><h2 class="section-title">Interests</h2></div>
      <div class="interests-strip">${data.interests.interests.map(i => `<div class="interest-pill">${i}</div>`).join('')}</div>` : ''}
    </div>
    <footer style="padding: 2rem 3rem; border-top: 1px solid rgba(201,168,76,0.15);">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div class="footer-social">${socialLinks.map(item => { const href = buildSocialHref(item); return href ? `<a href="${href}" target="_blank" rel="noopener" class="social-icon" title="${item.name}">${getIconHTML(item.icon)}</a>` : ''; }).join('')}</div>
        <div class="footer-contact">
          ${p.email ? `<a href="mailto:${p.email}"><i data-lucide="mail"></i>${p.email}</a>` : ''}
          ${p.phone ? `<a href="tel:${p.phone}"><i data-lucide="phone"></i>${p.phone}</a>` : ''}
        </div>
      </div>
      <div class="copyright">© ${new Date().getFullYear()} ${fullName}</div>
    </footer>`;
    document.getElementById('app-root').innerHTML = html;
    initializeLucideIcons();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => renderApp(portfolioData));
  else renderApp(portfolioData);
  document.getElementById('backBtn').addEventListener('click', () => window.history.back());
  document.getElementById('homeBtn').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</body>
</html>
