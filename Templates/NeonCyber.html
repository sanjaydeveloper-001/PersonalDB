    .top-nav {

    .nav-btn {

      font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700;

    .nav-btn svg { width: 0.8rem; height: 0.8rem; }
    .nav-divider { width: 1px; height: 1rem; background: var(--line); }

    /* HERO */
    .hero {

      justify-content: center; padding: 7rem 3rem 4rem;
      position: relative; overflow: hidden;
    }
    .hero-grid-bg {

      background-size: 60px 60px;
    }
    .hero-glow-a { position:absolute;top:-100px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(155,89,255,0.15) 0%,transparent 70%);pointer-events:none; }
    .hero-glow-b { position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(0,245,255,0.1) 0%,transparent 70%);pointer-events:none; }

    .hero-inner { position:relative;z-index:1;max-width:1100px;margin:0 auto;width:100%; }
    .hero-tag { font-family:var(--font-mono);font-size:0.7rem;color:var(--cyan);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:1.5rem;animation:fadeUp 0.5s both; }
    .hero-name {
      font-size: clamp(3.5rem,9vw,8rem); font-weight:800;line-height:0.95;
      letter-spacing:-0.03em;color:var(--text);margin-bottom:1.5rem;
      animation:fadeUp 0.6s 0.1s both;
    }
    .hero-name .cyan { color:var(--cyan);text-shadow:0 0 30px var(--cyan),0 0 60px rgba(0,245,255,0.4); }
    .hero-name .pink { color:var(--pink);text-shadow:0 0 30px var(--pink),0 0 60px rgba(255,45,120,0.4); }

    .hero-sub { font-family:var(--font-mono);font-size:0.9rem;color:var(--soft);margin-bottom:2.5rem;animation:fadeUp 0.6s 0.2s both; }
    .hero-sub .cyan-text { color:var(--cyan); }

    .hero-split { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:2rem;animation:fadeUp 0.6s 0.3s both; }

    .hero-contact { display:flex;flex-direction:column;gap:0.6rem; }
    .contact-line { font-family:var(--font-mono);font-size:0.75rem;color:var(--soft);display:flex;align-items:center;gap:0.75rem; }
    .contact-line svg { width:0.8rem;height:0.8rem;color:var(--cyan); }
    .contact-line a { color:var(--soft);text-decoration:none;transition:color 0.2s; }
    .contact-line a:hover { color:var(--cyan); }

    .hero-actions { display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap; }
    .social-icon {

      color:var(--soft);text-decoration:none;transition:all 0.3s;

    .social-icon:hover { border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 15px rgba(0,245,255,0.4);transform:translateY(-3px); }
    .social-icon svg { width:0.85rem;height:0.85rem; }

    .resume-btn:hover { background:var(--cyan);color:var(--void);box-shadow:0 0 25px rgba(0,245,255,0.5); }

    .stat-box { padding:1.25rem;background:var(--panel);text-align:center;border-right:1px solid var(--line); }

    .stat-l { font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted); }

    .cyber-divider { height:1px;background:linear-gradient(90deg,var(--cyan),var(--pink),var(--violet),transparent);margin:4rem 0;opacity:0.4; }

    .sec-line { flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent); }

    /* SUMMARY */
    .summary-terminal {
      background:var(--panel);border:1px solid var(--line);padding:0;
      font-family:var(--font-mono);
    }
    .terminal-bar { padding:0.75rem 1.25rem;background:var(--panel2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:0.5rem; }
    .t-dot { width:10px;height:10px;border-radius:50%; }
    .t-dot-r { background:#ff5f56; }
    .t-dot-y { background:#ffbd2e; }
    .t-dot-g { background:#27c93f; }
    .terminal-title { font-size:0.65rem;letter-spacing:0.15em;color:var(--muted);margin-left:0.5rem; }
    .terminal-body { padding:1.5rem 1.75rem; }
    .term-prompt { color:var(--cyan);margin-right:0.75rem; }
    .term-text { color:var(--soft);font-size:0.875rem;line-height:1.9; }
    .term-cursor { display:inline-block;width:8px;height:1em;background:var(--cyan);margin-left:2px;animation:flicker 3s infinite;vertical-align:text-bottom; }

    .tl-date-tag { font-family:var(--font-mono);font-size:0.65rem;color:var(--cyan);letter-spacing:0.1em; }
    .tl-spine { display:flex;flex-direction:column;align-items:center; }
    .tl-dot { width:10px;height:10px;background:var(--cyan);margin-top:1.5rem;box-shadow:0 0 10px var(--cyan),0 0 20px rgba(0,245,255,0.4); flex-shrink:0; }
    .tl-line { flex:1;width:2px;background:linear-gradient(to bottom,var(--cyan),var(--faint));margin-top:6px; }

    .tl-score { font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);margin-top:0.4rem; }

    .proj-link:hover { background:var(--cyan);color:var(--void);box-shadow:0 0 15px rgba(0,245,255,0.4); }
    .proj-link svg { width:0.65rem;height:0.65rem; }

    /* SKILLS */
    .skills-cyber { display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--faint);border:1px solid var(--faint); }

    .cert-card:hover { background:var(--panel2); }
    .cert-card:hover::after { opacity:1; }
    .cert-iss { font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.15em;color:var(--pink);text-transform:uppercase;margin-bottom:0.4rem; }
    .cert-nm { font-size:0.975rem;font-weight:700;color:var(--text);margin-bottom:0.5rem; }
    .cert-lnk { display:inline-flex;align-items:center;gap:0.35rem;font-family:var(--font-mono);font-size:0.65rem;color:var(--cyan);text-decoration:none;letter-spacing:0.1em; }
    .cert-lnk:hover { text-shadow:0 0 10px var(--cyan); }
    .cert-lnk svg { width:0.65rem;height:0.65rem; }

    /* INTERESTS */
    .int-cyber { display:flex;flex-wrap:wrap;gap:0; }
    .int-item { font-family:var(--font-mono);font-size:0.8rem;color:var(--soft);border:1px solid var(--faint);padding:0.65rem 1.25rem;transition:all 0.25s;cursor:default;letter-spacing:0.05em; }
    .int-item:hover { border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,0.05);box-shadow:0 0 15px rgba(0,245,255,0.1); }

    /* FOOTER */
    .footer { border-top:1px solid var(--line);padding:2.5rem 3rem; }
    @media(max-width:640px) { .footer{padding:2rem 1.25rem;} }
    .footer-inner { max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem; }
    .footer-socials { display:flex;gap:0.5rem; }
    .footer-contacts { display:flex;gap:2rem;flex-wrap:wrap; }
    .footer-contacts a { font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.08em;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:0.4rem;transition:color 0.2s; }
    .footer-contacts a:hover { color:var(--cyan); }
    .footer-contacts a svg { width:0.75rem;height:0.75rem; }
    .copyright { font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.1em;color:var(--faint);text-align:center;margin-top:1.5rem; }
  </style>
</head>

    'Linkedin': `<svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`

  function getIconHTML(n) { if(BRAND_SVGS[n]) return BRAND_SVGS[n]; const m={'Globe':'globe','Mail':'mail','Phone':'phone','FileText':'file-text','MapPin':'map-pin'}; return `<i data-lucide="${m[n]||n.toLowerCase().replace(/([a-z])([A-Z])/g,'$1-$2').toLowerCase()}"></i>`; }
  function buildSocialHref(item) { let l=item.link||""; if(!l) return null; if(item.icon==='Mail'&&!l.startsWith('mailto:')) return `mailto:${l}`; return l; }
  function renderApp(data) {
    const p=data.profile, fullName=p.name||'User Name';
    const [firstName,...lastParts]=fullName.split(' ');
    const lastName=lastParts.join(' ')||'';
    const socialLinks=(p.social||[]).filter(i=>buildSocialHref(i));
    const cvLink=p.cvLink?.trim()||null;
    const eduC=data.education.length,expC=data.experience.length,projC=data.projects.length,certC=data.certifications.length;
    const html=`
    <div class="hero">
      <div class="hero-grid-bg"></div>
      <div class="hero-glow-a"></div>
      <div class="hero-glow-b"></div>
      <div class="hero-inner">
        <div class="hero-tag">// ${p.domain||'Developer'} · Portfolio ${new Date().getFullYear()}</div>
        <h1 class="hero-name"><span class="cyan">${firstName}</span><br><span class="pink">${lastName}</span></h1>
        <div class="hero-sub"><span class="cyan-text">></span> ${p.domain||'Full Stack Developer'} · ${p.location||'Remote'}</div>
        <div class="hero-split">
          <div class="hero-contact">
            ${p.email?`<div class="contact-line"><i data-lucide="mail"></i><a href="mailto:${p.email}">${p.email}</a></div>`:''}
            ${p.phone?`<div class="contact-line"><i data-lucide="phone"></i><span>${p.phone}</span></div>`:''}
            ${p.location?`<div class="contact-line"><i data-lucide="map-pin"></i><span>${p.location}</span></div>`:''}
          </div>
          <div class="hero-actions">
            ${socialLinks.map(item=>{const href=buildSocialHref(item);return href?`<a href="${href}" target="_blank" class="social-icon" title="${item.name}">${getIconHTML(item.icon)}</a>`:''}).join('')}
            ${cvLink?`<a href="${cvLink}" target="_blank" class="resume-btn"><i data-lucide="file-text"></i>Resume</a>`:''}
          </div>
        </div>
        <div class="hero-stats">
          <div class="stat-box"><span class="stat-n">${eduC}</span><span class="stat-l">Education</span></div>
          <div class="stat-box"><span class="stat-n">${expC}</span><span class="stat-l">Roles</span></div>
          <div class="stat-box"><span class="stat-n">${projC}</span><span class="stat-l">Projects</span></div>
          <div class="stat-box"><span class="stat-n">${certC}</span><span class="stat-l">Certs</span></div>
        </div>
      </div>
    </div>
    <div class="inner">
      ${p.summary?`<div class="cyber-divider"></div>
      <div class="sec-hd"><span class="sec-num">// 00</span><h2 class="sec-title"><span class="acc">About</span>_</h2><div class="sec-line"></div></div>
      <div class="summary-terminal">
        <div class="terminal-bar"><div class="t-dot t-dot-r"></div><div class="t-dot t-dot-y"></div><div class="t-dot t-dot-g"></div><span class="terminal-title">bio.txt</span></div>
        <div class="terminal-body"><span class="term-prompt">&gt;</span><span class="term-text">${p.summary.trim()}</span><span class="term-cursor"></span></div>
      </div>`:''}
      <div class="cyber-divider"></div>
      <div class="sec-hd"><span class="sec-num">// 01</span><h2 class="sec-title"><span class="acc">Education</span></h2><div class="sec-line"></div></div>
      <div class="tl">${data.education.map((edu,idx)=>`<div class="tl-item"><div class="tl-date"><span class="tl-date-tag">${edu.duration||''}</span></div><div class="tl-spine"><div class="tl-dot"></div>${idx<data.education.length-1?'<div class="tl-line"></div>':''}</div><div class="tl-card"><div class="tl-type">Academic</div><div class="tl-title">${edu.institution}</div><div class="tl-sub">${edu.course}</div>${edu.cgpa?`<div class="tl-score">// CGPA: ${edu.cgpa}</div>`:edu.percentage?`<div class="tl-score">// ${edu.percentage}%</div>`:''}</div></div>`).join('')}</div>
      <div class="cyber-divider"></div>
      <div class="sec-hd"><span class="sec-num">// 02</span><h2 class="sec-title"><span class="acc">Experience</span></h2><div class="sec-line"></div></div>
      <div class="tl">${data.experience.map((exp,idx)=>`<div class="tl-item"><div class="tl-date"><span class="tl-date-tag">${exp.duration||''}</span></div><div class="tl-spine"><div class="tl-dot"></div>${idx<data.experience.length-1?'<div class="tl-line"></div>':''}</div><div class="tl-card"><div class="tl-type">${exp.type||'Work'}</div><div class="tl-title">${exp.role}</div><div class="tl-sub">${exp.company}</div>${exp.description?`<div class="tl-desc">${exp.description}</div>`:''}</div></div>`).join('')}</div>
      <div class="cyber-divider"></div>
      <div class="sec-hd"><span class="sec-num">// 03</span><h2 class="sec-title"><span class="acc">Projects</span></h2><div class="sec-line"></div></div>
      <div class="proj-grid">${data.projects.map((proj,idx)=>`<div class="proj-item"><div><div class="proj-idx">project_0${idx+1}.exe</div><div class="proj-nm">${proj.title}</div>${proj.description?`<div class="proj-desc">${proj.description}</div>`:''}<div class="proj-tags">${(proj.tech||[]).map(t=>`<span class="proj-tag">${t}</span>`).join('')}</div></div><div class="proj-links">${proj.demo?`<a href="${proj.demo}" target="_blank" class="proj-link">Live <i data-lucide="arrow-up-right"></i></a>`:''}${proj.repo?`<a href="${proj.repo}" target="_blank" class="proj-link">Repo <i data-lucide="github"></i></a>`:''}</div></div>`).join('')}</div>
      <div class="cyber-divider"></div>
      <div class="sec-hd"><span class="sec-num">// 04</span><h2 class="sec-title"><span class="acc">Skills</span></h2><div class="sec-line"></div></div>
      <div class="skills-cyber">${(data.skills?.skills||[]).map(cat=>`<div class="skill-panel"><div class="skill-cat">${cat.category}</div><div class="skill-items">${cat.items.map(item=>`<div class="skill-row"><span>${item}</span><div class="skill-bar-wrap"><div class="skill-bar"></div></div></div>`).join('')}</div></div>`).join('')}</div>
      <div class="cyber-divider"></div>
      <div class="sec-hd"><span class="sec-num">// 05</span><h2 class="sec-title"><span class="acc">Certifications</span></h2><div class="sec-line"></div></div>
      <div class="certs-cyber">${data.certifications.map(cert=>`<div class="cert-card"><div class="cert-iss">${cert.issuer}</div><div class="cert-nm">${cert.name}</div>${cert.link?`<a href="${cert.link}" target="_blank" class="cert-lnk">Verify <i data-lucide="arrow-up-right"></i></a>`:''}</div>`).join('')}</div>
      ${data.interests?.interests?.length?`<div class="cyber-divider"></div>
      <div class="sec-hd"><span class="sec-num">// 06</span><h2 class="sec-title"><span class="acc">Interests</span></h2><div class="sec-line"></div></div>
      <div class="int-cyber">${data.interests.interests.map(i=>`<div class="int-item">${i}</div>`).join('')}</div>`:''}
    </div>
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-socials">${socialLinks.map(item=>{const href=buildSocialHref(item);return href?`<a href="${href}" target="_blank" class="social-icon" title="${item.name}">${getIconHTML(item.icon)}</a>`:''}).join('')}</div>
        <div class="footer-contacts">${p.email?`<a href="mailto:${p.email}"><i data-lucide="mail"></i>${p.email}</a>`:''} ${p.phone?`<a href="tel:${p.phone}"><i data-lucide="phone"></i>${p.phone}</a>`:''}</div>
      </div>
      <div class="copyright">// © ${new Date().getFullYear()} ${fullName} · All rights reserved</div>
    </footer>`;
    document.getElementById('app-root').innerHTML=html;
    initializeLucideIcons();
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>renderApp(portfolioData));
  else renderApp(portfolioData);
  document.getElementById('backBtn').addEventListener('click',()=>window.history.back());
  document.getElementById('homeBtn').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
</script>
</body>
</html>
